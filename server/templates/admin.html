            renderCriterios();
          } catch(e) {
            alert('Erro: ' + e.message);
            createBtn.disabled = false;
            createBtn.textContent = 'Criar Critério';
          }
        });
      }

      // =====================================================================
      // ===== MÓDULO: FILTROS DO APP ==========================================
      // =====================================================================
      async function renderFiltros() {
        pageContent.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        try {
          const res  = await apiFetch('/admin/filters');
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          renderFiltrosUI(data.filters || []);
        } catch(e) {
          pageContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderFiltrosUI(filters) {
        const isAdmin = adminUser?.role === 'admin' || adminUser?.role === 'colaborador';

        pageContent.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <h3 style="font-size:16px;font-weight:600">${filters.length} filtro${filters.length!==1?'s':''} cadastrado${filters.length!==1?'s':''}</h3>
            ${isAdmin ? '<button class="btn btn-orange" id="new-filtro-btn">+ Novo Filtro</button>' : ''}
          </div>

          ${filters.length === 0
            ? '<div class="empty-state"><div class="empty-state-icon">🔎</div><p>Nenhum filtro cadastrado</p></div>'
            : filters.map(f => {
                const now = new Date();
                const isExpired = f.seasonal && f.ends_at && new Date(f.ends_at) < now;
                return `
                  <div class="item-row" style="${!f.active?'opacity:0.6':''}">
                    <div class="item-avatar" style="background:${f.active?'var(--primary)':'#9ca3af'};font-size:20px;width:42px;height:42px">
                      ${f.icon ? `<span>${f.icon}</span>` : '🔎'}
                    </div>
                    <div class="item-info">
                      <div class="item-name">${escHtml(f.name)}</div>
                      <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
                        ${f.seasonal ? `<span class="badge" style="background:#f3e8ff;color:#7c3aed;font-size:10px">Sazonal</span>` : ''}
                        ${isExpired ? `<span class="badge" style="background:#fee2e2;color:#dc2626;font-size:10px">Expirado</span>` : ''}
                        ${f.seasonal && f.starts_at ? `<span style="font-size:11px;color:var(--text-muted)">${new Date(f.starts_at).toLocaleDateString('pt-BR')} – ${f.ends_at?new Date(f.ends_at).toLocaleDateString('pt-BR'):'?'}</span>` : ''}
                      </div>
                    </div>
                    <div class="item-actions">
                      ${isAdmin ? `<button class="btn btn-sm btn-gray edit-filtro" data-id="${f.id}">✏️</button>` : ''}
                      <label class="toggle" title="${f.active?'Desativar':'Ativar'}">
                        <input type="checkbox" class="filtro-toggle" data-id="${f.id}" ${f.active?'checked':''} ${!isAdmin?'disabled':''}>
                        <span class="toggle-slider"></span>
                      </label>
                    </div>
                  </div>
                `;
              }).join('')
          }
        `;

        pageContent.querySelectorAll('.filtro-toggle').forEach(chk => {
          chk.addEventListener('change', async () => {
            const id = chk.dataset.id;
            chk.disabled = true;
            try {
              const res = await apiFetch(`/admin/filters/${id}/toggle`, { method: 'PATCH' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderFiltros();
            } catch(e) { alert('Erro: ' + e.message); chk.checked = !chk.checked; chk.disabled = false; }
          });
        });

        pageContent.querySelectorAll('.edit-filtro').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            const f = filters.find(x => x.id === id);
            if (f) openFiltroModal(f);
          });
        });

        document.getElementById('new-filtro-btn')?.addEventListener('click', () => openFiltroModal(null));
      }

      function openFiltroModal(f) {
        const isNew = !f;
        openModal(isNew ? 'Novo Filtro' : 'Editar Filtro', `
          <div class="field-group">
            <label class="field-label">Nome *</label>
            <input class="field-input" id="f-name" value="${f?escHtml(f.name):''}" placeholder="Ex: Especial Férias" />
          </div>
          <div class="field-group">
            <label class="field-label">Ícone (emoji)</label>
            <input class="field-input" id="f-icon" value="${f&&f.icon?escHtml(f.icon):''}" placeholder="🎈" style="font-size:20px" maxlength="4" />
          </div>
          <div class="field-group">
            <label class="toggle-wrap" style="cursor:pointer;gap:10px">
              <label class="toggle"><input type="checkbox" id="f-seasonal" ${f&&f.seasonal?'checked':''}><span class="toggle-slider"></span></label>
              <span style="font-size:14px">Sazonal (com data de expiração)</span>
            </label>
          </div>
          <div id="f-dates-wrap" style="${f&&f.seasonal?'':'display:none'}">
            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Data de início</label>
                <input class="field-input" id="f-starts" type="date" value="${f&&f.starts_at?f.starts_at.slice(0,10):''}" />
              </div>
              <div class="field-group">
                <label class="field-label">Data de fim</label>
                <input class="field-input" id="f-ends" type="date" value="${f&&f.ends_at?f.ends_at.slice(0,10):''}" />
              </div>
            </div>
          </div>
          <div class="field-group">
            <label class="toggle-wrap" style="cursor:pointer;gap:10px">
              <label class="toggle"><input type="checkbox" id="f-active" ${!f||f.active?'checked':''}><span class="toggle-slider"></span></label>
              <span style="font-size:14px">Ativo</span>
            </label>
          </div>
        `, `
          <button class="btn btn-gray" id="f-cancel">Cancelar</button>
          <button class="btn btn-orange" id="f-save">Salvar</button>
        `);

        document.getElementById('f-seasonal').addEventListener('change', e => {
          document.getElementById('f-dates-wrap').style.display = e.target.checked ? '' : 'none';
        });

        document.getElementById('f-cancel').addEventListener('click', closeModal);

        document.getElementById('f-save').addEventListener('click', async () => {
          const name     = document.getElementById('f-name').value.trim();
          const icon     = document.getElementById('f-icon').value.trim();
          const seasonal = document.getElementById('f-seasonal').checked;
          const active   = document.getElementById('f-active').checked;
          const startsAt = seasonal ? document.getElementById('f-starts').value : null;
          const endsAt   = seasonal ? document.getElementById('f-ends').value : null;

          if (!name) { alert('Nome é obrigatório'); return; }

          const body = { name, icon: icon||null, active, seasonal,
            starts_at: startsAt ? `${startsAt}T00:00:00.000Z` : null,
            ends_at:   endsAt   ? `${endsAt}T23:59:59.000Z`   : null,
          };

          const saveBtn = document.getElementById('f-save');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Salvando…';
          try {
            const res = f
              ? await apiFetch(`/admin/filters/${f.id}`, { method: 'PATCH', body: JSON.stringify(body) })
              : await apiFetch('/admin/filters', { method: 'POST', body: JSON.stringify(body) });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            closeModal();
            renderFiltros();
          } catch(e) {
            alert('Erro: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.textContent = 'Salvar';
          }
        });
      }

      // =====================================================================
      // ===== MÓDULO: GESTÃO DE CIDADES ======================================
      // =====================================================================
      let cidadesSearch = '';

      async function renderCidades() {
        pageContent.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        try {
          const param = cidadesSearch ? `?search=${encodeURIComponent(cidadesSearch)}` : '';
          const res   = await apiFetch(`/admin/cities${param}`);
          const data  = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          renderCidadesUI(data.cities || []);
        } catch(e) {
          pageContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderCidadesUI(cities) {
        const isAdmin = adminUser?.role === 'admin' || adminUser?.role === 'colaborador';
        const freqLabels = { diaria:'Diária', semanal:'Semanal', quinzenal:'Quinzenal', mensal:'Mensal' };

        pageContent.innerHTML = `
          <div class="search-bar">
            <input class="search-input" id="cidade-search" placeholder="Buscar cidade ou estado…" value="${escHtml(cidadesSearch)}" />
            ${isAdmin ? '<button class="btn btn-orange" id="new-cidade-btn">+ Nova Cidade</button>' : ''}
          </div>

          ${cities.length === 0
            ? '<div class="empty-state"><div class="empty-state-icon">🏙️</div><p>Nenhuma cidade cadastrada</p></div>'
            : cities.map(c => `
                <div class="item-row" style="${!c.ativa?'opacity:0.6':''}">
                  <div class="item-avatar" style="background:${c.ativa?'#2563EB':'#9ca3af'};font-size:20px;width:42px;height:42px">🏙️</div>
                  <div class="item-info">
                    <div class="item-name">${escHtml(c.nome)} <span style="font-weight:400;color:var(--text-muted)">${escHtml(c.estado)}</span></div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
                      ${c.raio_km}km · ${freqLabels[c.frequencia]||c.frequencia}
                      ${c.ultima_varredura ? ' · Última: ' + new Date(c.ultima_varredura).toLocaleDateString('pt-BR') : ' · Nunca varrida'}
                    </div>
                  </div>
                  <div class="item-actions">
                    ${isAdmin ? `<button class="btn btn-sm btn-gray edit-cidade" data-id="${c.id}">✏️</button>` : ''}
                    ${isAdmin ? `<button class="btn btn-sm btn-red delete-cidade" data-id="${c.id}" data-name="${escHtml(c.nome)}">🗑</button>` : ''}
                    <label class="toggle" title="${c.ativa?'Desativar':'Ativar'}">
                      <input type="checkbox" class="cidade-toggle" data-id="${c.id}" ${c.ativa?'checked':''} ${!isAdmin?'disabled':''}>
                      <span class="toggle-slider"></span>
                    </label>
                  </div>
                </div>
              `).join('')
          }
        `;

        let searchTimer;
        document.getElementById('cidade-search').addEventListener('input', e => {
          clearTimeout(searchTimer);
          cidadesSearch = e.target.value;
          searchTimer = setTimeout(renderCidades, 350);
        });

        pageContent.querySelectorAll('.cidade-toggle').forEach(chk => {
          chk.addEventListener('change', async () => {
            const id = chk.dataset.id;
            chk.disabled = true;
            try {
              const res = await apiFetch(`/admin/cities/${id}/toggle`, { method: 'PATCH' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderCidades();
            } catch(e) { alert('Erro: ' + e.message); chk.checked = !chk.checked; chk.disabled = false; }
          });
        });

        pageContent.querySelectorAll('.edit-cidade').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            const city = cities.find(c => c.id === id);
            if (city) openCidadeModal(city);
          });
        });

        pageContent.querySelectorAll('.delete-cidade').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id   = btn.dataset.id;
            const name = btn.dataset.name;
            if (!confirm(`Excluir "${name}"? Esta ação não pode ser desfeita.`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/cities/${id}`, { method: 'DELETE' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderCidades();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        document.getElementById('new-cidade-btn')?.addEventListener('click', () => openCidadeModal(null));
      }

      function openCidadeModal(city) {
        const isNew = !city;
        openModal(isNew ? 'Nova Cidade' : 'Editar Cidade', `
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Nome da cidade *</label>
              <input class="field-input" id="cid-nome" value="${city?escHtml(city.nome):''}" placeholder="São Paulo" />
            </div>
            <div class="field-group">
              <label class="field-label">Estado (UF) *</label>
              <input class="field-input" id="cid-estado" value="${city?escHtml(city.estado):''}" placeholder="SP" maxlength="2" style="text-transform:uppercase" />
            </div>
          </div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Latitude</label>
              <input class="field-input" id="cid-lat" value="${city?escHtml(city.latitude):''}" placeholder="-23.5505" />
            </div>
            <div class="field-group">
              <label class="field-label">Longitude</label>
              <input class="field-input" id="cid-lng" value="${city?escHtml(city.longitude):''}" placeholder="-46.6333" />
            </div>
          </div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Raio (km)</label>
              <input class="field-input" id="cid-raio" type="number" value="${city?city.raio_km:20}" min="1" max="200" />
            </div>
            <div class="field-group">
              <label class="field-label">Ativo</label>
              <label class="toggle-wrap" style="cursor:pointer;gap:10px;margin-top:10px">
                <label class="toggle"><input type="checkbox" id="cid-ativa" ${!city||city.ativa?'checked':''}><span class="toggle-slider"></span></label>
                <span style="font-size:14px">Ativa</span>
              </label>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Frequência de varredura</label>
            <div class="pill-group" id="cid-freq-pills">
              ${['diaria','semanal','quinzenal','mensal'].map(freq => {
                const labels = { diaria:'Diária', semanal:'Semanal', quinzenal:'Quinzenal', mensal:'Mensal' };
                const selected = city ? city.frequencia === freq : freq === 'semanal';
                return `<button class="pill${selected?' selected':''}" data-freq="${freq}">${labels[freq]}</button>`;
              }).join('')}
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Parâmetros do prompt (JSON)</label>
            <textarea class="field-input" id="cid-params" rows="3" placeholder='{"bairros":["Centro","Pinheiros"]}'>${city&&city.parametros_prompt?JSON.stringify(city.parametros_prompt,null,2):''}</textarea>
            <p class="field-sub">Opcional. Parâmetros adicionais para personalizar o prompt de IA nesta cidade.</p>
          </div>
        `, `
          <button class="btn btn-gray" id="cid-cancel">Cancelar</button>
          <button class="btn btn-orange" id="cid-save">Salvar</button>
        `, true);

        let selectedFreq = city ? city.frequencia : 'semanal';

        document.querySelectorAll('#cid-freq-pills .pill').forEach(p => {
          p.addEventListener('click', () => {
            selectedFreq = p.dataset.freq;
            document.querySelectorAll('#cid-freq-pills .pill').forEach(pp => pp.classList.remove('selected'));
            p.classList.add('selected');
          });
        });

        document.getElementById('cid-cancel').addEventListener('click', closeModal);

        document.getElementById('cid-save').addEventListener('click', async () => {
          const nome   = document.getElementById('cid-nome').value.trim();
          const estado = document.getElementById('cid-estado').value.trim().toUpperCase();
          const lat    = document.getElementById('cid-lat').value.trim();
          const lng    = document.getElementById('cid-lng').value.trim();
          const raio   = parseInt(document.getElementById('cid-raio').value, 10);
          const ativa  = document.getElementById('cid-ativa').checked;
          const paramsRaw = document.getElementById('cid-params').value.trim();

          if (!nome || !estado) { alert('Nome e estado são obrigatórios.'); return; }

          let parametros_prompt = null;
          if (paramsRaw) {
            try { parametros_prompt = JSON.parse(paramsRaw); } catch { alert('JSON de parâmetros inválido.'); return; }
          }

          const body = { nome, estado, latitude: lat||null, longitude: lng||null, raio_km: raio||20, frequencia: selectedFreq, ativa, parametros_prompt };

          const saveBtn = document.getElementById('cid-save');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Salvando…';
          try {
            const res = city
              ? await apiFetch(`/admin/cities/${city.id}`, { method: 'PATCH', body: JSON.stringify(body) })
              : await apiFetch('/admin/cities', { method: 'POST', body: JSON.stringify(body) });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            closeModal();
            renderCidades();
          } catch(e) {
            alert('Erro: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.textContent = 'Salvar';
          }
        });
      }

      // =====================================================================
      // ===== SHELL / LOGIN TOGGLE ===========================================
      // =====================================================================
      function enterShell() {
        loginPage.style.display = 'none';
        appShell.style.display  = 'flex';

        if (adminUser) {
          const initial = adminUser.name.charAt(0).toUpperCase();
          adminName.textContent       = adminUser.name;
          adminAvatar.textContent     = initial;
          adminRoleLabel.textContent  = adminUser.role;
          topbarAdminName.textContent = adminUser.name;
          topbarAvatar.textContent    = initial;
        }

        navigateTo('dashboard');
        loadFeedbackBadge();
      }

      function showLogin() {
        appShell.style.display  = 'none';
        loginPage.style.display = 'flex';
        loginError.style.display = 'none';
        document.getElementById('email').value    = '';
        document.getElementById('password').value = '';
      }

      async function loadFeedbackBadge() {
        try {
          const res  = await apiFetch('/admin/feedback?type=sugestao');
          const data = await res.json();
          if (res.ok && data.unreadCount > 0) {
            feedbackBadge.textContent = data.unreadCount;
            feedbackBadge.style.display = '';
          }
        } catch {}
      }

      // ===== INIT =====
      async function init() {
        if (!currentToken) { showLogin(); return; }

        try {
          const res  = await apiFetch('/admin/auth/me');
          if (!res.ok) throw new Error('unauthorized');
          const data = await res.json();
          adminUser  = data.user;
          enterShell();
        } catch {
          currentToken = null;
          localStorage.removeItem(STORAGE_KEY);
          showLogin();
        }
      }

      // ===== UTILS =====
      function escHtml(str) {
        return String(str ?? '')
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;');
      }

      init();
    })();
    </script>
  </body>
</html>
