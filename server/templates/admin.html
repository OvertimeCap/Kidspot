      function renderAiHubRouting() {
        const cont = document.getElementById('ai-hub-content');
        if (!cont) return;

        const providerOptions = [
          { value: '', label: '— Nenhum —' },
          { value: 'openai', label: 'OpenAI' },
          { value: 'anthropic', label: 'Anthropic / Claude' },
          { value: 'perplexity', label: 'Perplexity' },
          { value: 'google', label: 'Google Gemini' },
        ];

        const modelsByProvider = {
          openai: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo'],
          anthropic: ['claude-opus-4-5', 'claude-sonnet-4-5', 'claude-haiku-4-5', 'claude-3-5-sonnet-20241022'],
          perplexity: ['llama-3.1-sonar-large-128k-online', 'llama-3.1-sonar-small-128k-online'],
          google: ['gemini-1.5-pro', 'gemini-1.5-flash', 'gemini-2.0-flash-exp'],
        };

        const routingByStage = Object.fromEntries(aiHubRouting.map(r => [r.stage, r]));
        const stages = ['place_discovery', 'review_analysis', 'description_generation', 'score_calculation'];

        const configuredProviders = aiHubProviders.filter(p => p.configured).map(p => p.provider);

        cont.innerHTML = `
          <div style="margin-top:4px">
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px">
              Defina qual provedor e modelo utilizar em cada etapa do pipeline. As alterações entram em vigor na próxima execução.
            </p>
            <div style="display:flex;flex-direction:column;gap:14px">
              ${stages.map(stage => {
                const r = routingByStage[stage] || {};
                const stageLabel = STAGE_LABELS[stage] || stage;
                const currentProvider = r.primary_provider || '';
                const currentModel = r.model || '';
                const fallbackOrder = r.fallback_order || [];
                const hasProvider = !!currentProvider;
                const isConfigured = !currentProvider || configuredProviders.includes(currentProvider);
                const alertStyle = !hasProvider ? 'border-color:#fbbf24;' : (!isConfigured ? 'border-color:#fecaca;' : '');

                const modelOptions = currentProvider && modelsByProvider[currentProvider]
                  ? modelsByProvider[currentProvider].map(m => `<option value="${m}" ${m===currentModel?'selected':''}>${m}</option>`).join('')
                  : '';

                const fallbackProviders = ['openai', 'anthropic', 'perplexity', 'google'].filter(p => p !== currentProvider);

                return `
                  <div style="background:var(--surface);border:1.5px solid var(--border);${alertStyle}border-radius:var(--radius);padding:18px">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
                      <div style="font-weight:600;font-size:14px;flex:1">${escHtml(stageLabel)}</div>
                      ${!hasProvider ? '<span style="font-size:11px;background:#fef9c3;color:#92400e;border-radius:4px;padding:2px 7px">⚠️ Sem provedor</span>' : ''}
                      ${hasProvider && !isConfigured ? '<span style="font-size:11px;background:#fef2f2;color:#dc2626;border-radius:4px;padding:2px 7px">⚠️ Chave não configurada</span>' : ''}
                    </div>
                    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
                      <div style="flex:1;min-width:160px">
                        <label style="display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:5px">Provedor primário</label>
                        <select id="route-provider-${stage}" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--surface)">
                          ${providerOptions.map(o => `<option value="${o.value}" ${o.value===currentProvider?'selected':''}>${o.label}</option>`).join('')}
                        </select>
                      </div>
                      <div style="flex:1;min-width:160px">
                        <label style="display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:5px">Modelo</label>
                        <select id="route-model-${stage}" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--surface)">
                          ${modelOptions || '<option value="">— Selecione um provedor —</option>'}
                        </select>
                      </div>
                      <button id="route-save-${stage}" style="padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">
                        Salvar
                      </button>
                    </div>
                    <div style="margin-top:12px">
                      <label style="display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:6px">Ordem de fallback</label>
                      <div style="display:flex;gap:8px;flex-wrap:wrap">
                        ${fallbackProviders.map(fp => {
                          const idx = fallbackOrder.indexOf(fp);
                          const active = idx >= 0;
                          return `
                            <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:4px 10px;border:1.5px solid ${active?'var(--primary)':'var(--border)'};border-radius:20px;background:${active?'var(--primary-light)':'transparent'};color:${active?'var(--primary)':'var(--text-muted)'}">
                              <input type="checkbox" data-fb-stage="${stage}" data-fb-provider="${fp}" ${active?'checked':''} style="accent-color:var(--primary)" />
                              ${escHtml(PROVIDER_LABELS[fp] || fp)} ${active ? `(#${idx+1})` : ''}
                            </label>
                          `;
                        }).join('')}
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;

        stages.forEach(stage => {
          const providerSelect = document.getElementById('route-provider-' + stage);
          const modelSelect = document.getElementById('route-model-' + stage);

          if (providerSelect && modelSelect) {
            providerSelect.addEventListener('change', () => {
              const prov = providerSelect.value;
              const models = modelsByProvider[prov] || [];
              modelSelect.innerHTML = models.length
                ? models.map(m => `<option value="${m}">${m}</option>`).join('')
                : '<option value="">— Selecione um provedor —</option>';
            });
          }

          const saveBtn = document.getElementById('route-save-' + stage);
          if (saveBtn) {
            saveBtn.addEventListener('click', async () => {
              const prov = providerSelect ? providerSelect.value : '';
              const model = modelSelect ? modelSelect.value : '';
              const fbCheckboxes = document.querySelectorAll(`input[data-fb-stage="${stage}"]`);
              const fallbackOrder = Array.from(fbCheckboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.getAttribute('data-fb-provider'));

              saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';
              try {
                const body = {
                  primary_provider: prov || null,
                  model: model || null,
                  fallback_order: fallbackOrder,
                };
                const res = await apiFetch(`/admin/pipeline-routing/${stage}`, {
                  method: 'PATCH', body: JSON.stringify(body)
                });
                const d = await res.json();
                if (!res.ok) throw new Error(d.error || 'Erro');
                await loadAiHubData();
                renderAiHubRouting();
              } catch(e) {
                alert('Erro: ' + e.message);
                saveBtn.disabled = false; saveBtn.textContent = 'Salvar';
              }
            });
          }
        });
      }

      // ===== MÓDULO: PROMPTS DE IA ==========================================
      // =====================================================================
      let promptDraft = null;

        pageContent.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        try {
          const res  = await apiFetch('/admin/ai-prompts/active');
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          renderPromptsUI(data.prompt);

          pageContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderPromptsUI(prompt) {
        const isAdmin = adminUser?.role === 'admin';
        const currentText = promptDraft !== null ? promptDraft : (prompt?.prompt || '');

        pageContent.innerHTML = `
          <div class="info-box">
            <span class="info-box-icon">ℹ️</span>
            <span>Este prompt define como a IA analisa reviews de estabelecimentos para famílias com crianças.${!isAdmin?' Apenas administradores podem editar.':''}</span>
          </div>

          ${promptDraft !== null && promptDraft !== (prompt?.prompt || '') ? `
            <div class="warn-bar" id="dirty-bar">
              ✏️ Alterações não salvas
              <button class="btn btn-sm btn-gray" id="discard-prompt" style="margin-left:auto">Descartar</button>
              <button class="btn btn-sm btn-orange" id="save-prompt">Salvar Prompt</button>
            </div>
          ` : ''}

          <div class="card" style="margin-bottom:20px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
              <span style="font-size:18px">✨</span>
              <strong style="font-size:16px">System Prompt Atual</strong>
            </div>
            <textarea class="field-input" id="prompt-editor" rows="14" ${!isAdmin?'readonly':''}>${escHtml(currentText)}</textarea>
            ${isAdmin && (promptDraft === null || promptDraft === (prompt?.prompt || '')) ? `
              <div style="display:flex;justify-content:flex-end;margin-top:12px">
                <button class="btn btn-orange" id="save-prompt-inline" ${promptDraft === null || promptDraft === (prompt?.prompt||'')?'disabled':''}>💾 Salvar Prompt</button>
              </div>
            ` : ''}
          </div>

          <div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
              <span style="font-size:18px">🧪</span>
              <strong style="font-size:16px">Teste em Tempo Real</strong>
            </div>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">Teste o prompt atual com dados de exemplo antes de salvar.</p>

            <div class="field-group">
              <label class="field-label">Nome do estabelecimento</label>
              <input class="field-input" id="test-place-name" value="Restaurante Família Feliz" />
            </div>

            <div class="field-group">
              <label class="field-label">Reviews (uma por linha, máx. 5)</label>
              <textarea class="field-input" id="test-reviews" rows="4">Ótimo lugar, tem brinquedoteca e cardápio infantil. As crianças adoraram!
Tem fraldário limpo e cadeirão para bebês. Excelente atendimento para famílias.</textarea>
            </div>

            <button class="btn btn-orange" id="run-test-btn">▶ Executar Teste</button>
            <div id="test-result" style="margin-top:14px"></div>
          </div>
        `;

        const editor = document.getElementById('prompt-editor');
        if (isAdmin && editor) {
          editor.addEventListener('input', () => {
            promptDraft = editor.value;
            const originalText = prompt?.prompt || '';
            const isDirty = promptDraft !== originalText;

            let dirtyBar = document.getElementById('dirty-bar');
            if (isDirty && !dirtyBar) {
              dirtyBar = document.createElement('div');
              dirtyBar.className = 'warn-bar';
              dirtyBar.id = 'dirty-bar';
              dirtyBar.innerHTML = '✏️ Alterações não salvas <button class="btn btn-sm btn-gray" id="discard-prompt" style="margin-left:auto">Descartar</button><button class="btn btn-sm btn-orange" id="save-prompt">Salvar Prompt</button>';
              editor.closest('.card').insertAdjacentElement('beforebegin', dirtyBar);
              document.getElementById('discard-prompt')?.addEventListener('click', () => { promptDraft = null; renderPromptsUI(prompt); });
              document.getElementById('save-prompt')?.addEventListener('click', doSave);
            } else if (!isDirty && dirtyBar) {
              dirtyBar.remove();
            }

            const inlineBtn = document.getElementById('save-prompt-inline');
            if (inlineBtn) inlineBtn.disabled = !isDirty;
          });
        }

        const discardBtn = document.getElementById('discard-prompt');
        if (discardBtn) {
          discardBtn.addEventListener('click', () => { promptDraft = null; renderPromptsUI(prompt); });
        }

        async function doSave() {
          const text = promptDraft !== null ? promptDraft : currentText;
          const saveBtn = document.getElementById('save-prompt') || document.getElementById('save-prompt-inline');
          if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Salvando…'; }
          try {
            const res = await apiFetch('/admin/ai-prompts/active', { method: 'PUT', body: JSON.stringify({ prompt: text }) });
            const d   = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            promptDraft = null;
            alert('Prompt salvo com sucesso! A IA usará este prompt na próxima execução.');
            renderPrompts();
          } catch(e) {
            alert('Erro: ' + e.message);
            if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Salvar Prompt'; }
          }
        }

        document.getElementById('save-prompt')?.addEventListener('click', doSave);
        document.getElementById('save-prompt-inline')?.addEventListener('click', doSave);

        document.getElementById('run-test-btn').addEventListener('click', async () => {
          const placeName = document.getElementById('test-place-name').value.trim();
          const reviewsRaw = document.getElementById('test-reviews').value;
          const reviews = reviewsRaw.split('\n').map(r=>r.trim()).filter(Boolean).slice(0,5);

          if (!placeName || reviews.length === 0) { alert('Preencha o nome do local e pelo menos uma review.'); return; }

          const testBtn = document.getElementById('run-test-btn');
          const resultDiv = document.getElementById('test-result');
          testBtn.disabled = true;
          testBtn.textContent = '⏳ Executando…';
          resultDiv.innerHTML = '<div class="spinner-wrap" style="height:80px"><div class="spinner"></div></div>';

          try {
            const res = await apiFetch('/admin/ai-prompts/test', {
              method: 'POST',
              body: JSON.stringify({ prompt: editor?.value || currentText, placeName, reviews })
            });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro ao testar');
            const r = d.result;
            const confColors = { high:'#059669', medium:'#D97706', low:'#DC2626' };
            const confLabels = { high:'Alta', medium:'Média', low:'Baixa' };
            resultDiv.innerHTML = `
              <div class="card" style="background:#f0fdf4;border-color:#bbf7d0">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                  <span>✅</span><strong style="color:#065f46">Resultado da IA</strong>
                </div>
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                  <span style="font-size:13px;font-weight:600;min-width:90px">Score familiar:</span>
                  <div class="score-bar"><div class="score-bar-fill" style="width:${r.family_score}%"></div></div>
                  <span style="font-size:13px;font-weight:700;color:#059669">${r.family_score}/100</span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                  <span style="font-size:13px;font-weight:600;min-width:90px">Confiança:</span>
                  <span class="badge" style="background:${confColors[r.confidence]}18;color:${confColors[r.confidence]}">${confLabels[r.confidence]||r.confidence}</span>
                </div>
                ${r.highlights?.length > 0 ? `
                  <div>
                    <span style="font-size:13px;font-weight:600">Destaques:</span>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
                      ${r.highlights.map(h=>`<span class="badge" style="background:var(--primary-light);color:var(--primary)">⭐ ${escHtml(h)}</span>`).join('')}
                    </div>
                  </div>
                ` : '<p style="font-size:13px;color:var(--text-muted);font-style:italic">Nenhum destaque familiar detectado.</p>'}
              </div>
            `;
          } catch(e) {
            resultDiv.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
          } finally {
            testBtn.disabled = false;
            testBtn.textContent = '▶ Executar Teste';
          }
        });
      }

      // =====================================================================
      // ===== MÓDULO: MOTOR DE RANQUEAMENTO (KIDSCORE) =======================
      // =====================================================================
      let kidscoreRules = [];
      let kidscoreDirty = {};

      async function renderKidscore() {
        pageContent.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        try {
          const res  = await apiFetch('/admin/kidscore-rules');
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          kidscoreRules = data.rules || [];
          kidscoreDirty = {};
          renderKidscoreUI();
        } catch(e) {
          pageContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderKidscoreUI() {
        const isAdmin = adminUser?.role === 'admin';
        const hasDirty = Object.keys(kidscoreDirty).length > 0;

        pageContent.innerHTML = `
          <div class="info-box">
            <span class="info-box-icon">ℹ️</span>
            <span>Os pesos determinam quantos pontos cada critério contribui para o KidScore. Critérios inativos não são computados.${!isAdmin?' Apenas administradores podem editar.':''}</span>
          </div>

          ${hasDirty && isAdmin ? `
            <div class="warn-bar" id="ks-dirty-bar">
              ✏️ ${Object.keys(kidscoreDirty).length} alteração(ões) não salva(s)
              <button class="btn btn-sm btn-gray" id="ks-discard" style="margin-left:auto">Descartar</button>
              <button class="btn btn-sm btn-orange" id="ks-save">💾 Salvar</button>
            </div>
          ` : ''}

          <div id="ks-rules-list">
            ${kidscoreRules.length === 0
              ? '<div class="empty-state"><div class="empty-state-icon">⚖️</div><p>Nenhuma regra cadastrada</p></div>'
              : kidscoreRules.map(r => {
                  const dirty = kidscoreDirty[r.id];
                  const curWeight = dirty?.weight !== undefined ? dirty.weight : r.weight;
                  const curActive = dirty?.is_active !== undefined ? dirty.is_active : r.is_active;
                  return `
                    <div class="card card-sm" style="margin-bottom:8px;${dirty?'border-color:#fde68a;background:#fffde7':''}">
                      <div style="display:flex;align-items:center;gap:12px">
                        <div style="flex:1">
                          <div style="display:flex;align-items:center;gap:6px">
                            ${dirty ? '<span style="width:7px;height:7px;border-radius:50%;background:#D97706;display:inline-block"></span>' : ''}
                            <span style="font-size:14px;font-weight:600;${!curActive?'color:var(--text-muted);text-decoration:line-through':''}">${escHtml(r.label)}</span>
                          </div>
                          <div style="font-size:11px;color:var(--text-muted);font-style:italic;margin-top:2px">${escHtml(r.key)}</div>
                          ${!curActive ? '<span style="font-size:11px;color:var(--text-muted);background:#f3f4f6;padding:2px 8px;border-radius:4px;margin-top:4px;display:inline-block">Inativo — não contribui para o score</span>' : ''}
                        </div>
                        <div style="display:flex;align-items:center;gap:10px">
                          <div style="display:flex;align-items:center;gap:4px">
                            <span style="font-size:12px;color:var(--text-muted)">Peso:</span>
                            ${isAdmin
                              ? `<input type="number" class="field-input ks-weight" data-id="${r.id}" value="${curWeight}" min="0" max="9999" style="width:70px;text-align:center;padding:5px 8px;${!curActive?'color:var(--text-muted)':''}" ${!curActive?'disabled':''}>`
                              : `<span style="font-size:16px;font-weight:700">${curWeight}</span>`
                            }
                            <span style="font-size:12px;color:var(--text-muted)">pts</span>
                          </div>
                          ${isAdmin ? `
                            <label class="toggle" title="${curActive?'Desativar':'Ativar'}">
                              <input type="checkbox" class="ks-active" data-id="${r.id}" ${curActive?'checked':''}>
                              <span class="toggle-slider"></span>
                            </label>
                          ` : ''}
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')
            }
          </div>
        `;

        if (isAdmin) {
          pageContent.querySelectorAll('.ks-weight').forEach(inp => {
            inp.addEventListener('input', () => {
              const id  = inp.dataset.id;
              const val = parseInt(inp.value, 10);
              if (!kidscoreDirty[id]) kidscoreDirty[id] = {};
              kidscoreDirty[id].weight = isNaN(val) ? 0 : val;
              renderKidscoreUI();
            });
          });

          pageContent.querySelectorAll('.ks-active').forEach(chk => {
            chk.addEventListener('change', () => {
              const id = chk.dataset.id;
              if (!kidscoreDirty[id]) kidscoreDirty[id] = {};
              kidscoreDirty[id].is_active = chk.checked;
              renderKidscoreUI();
            });
          });

          document.getElementById('ks-discard')?.addEventListener('click', () => {
            kidscoreDirty = {};
            renderKidscoreUI();
          });

          document.getElementById('ks-save')?.addEventListener('click', async () => {
            const rules = Object.entries(kidscoreDirty).map(([id, changes]) => {
              const original = kidscoreRules.find(r => r.id === id);
              return {
                id,
                weight:    changes.weight    !== undefined ? changes.weight    : original.weight,
                is_active: changes.is_active !== undefined ? changes.is_active : original.is_active,
              };
            });

            if (!confirm(`Salvar ${rules.length} alteração(ões) no motor de ranqueamento?`)) return;

            const saveBtn = document.getElementById('ks-save');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Salvando…';
            try {
              const res = await apiFetch('/admin/kidscore-rules', { method: 'PUT', body: JSON.stringify({ rules }) });
              const d   = await res.json();
              if (!res.ok) throw new Error(d.error || 'Erro');
              kidscoreDirty = {};
              alert('Regras de ranqueamento atualizadas com sucesso!');
              renderKidscore();
            } catch(e) {
              alert('Erro: ' + e.message);
              saveBtn.disabled = false;
              saveBtn.textContent = '💾 Salvar';
            }
          });
        }
      }

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div class="info-box" style="flex:1;margin-bottom:0;margin-right:12px">
              <span class="info-box-icon">ℹ️</span>
              <span>Critérios customizados aparecerão na Fila de Curadoria e nos filtros do app.${!isAdmin?' Apenas administradores podem criar ou excluir.':''}</span>
            </div>
            ${isAdmin ? '<button class="btn btn-orange" id="new-criterio-btn">+ Novo Critério</button>' : ''}
          </div>

          ${criteria.length === 0
            ? `<div class="empty-state"><div class="empty-state-icon">🏷️</div><p>Nenhum critério customizado</p></div>`
            : criteria.map(c => {
                const color = typeColors[c.field_type] || '#6B7280';
                const tlabel = typeLabels[c.field_type] || c.field_type;
                return `
                  <div class="card card-sm" style="margin-bottom:8px;${!c.is_active?'opacity:0.7':''}">
                    <div style="display:flex;align-items:flex-start;gap:12px">
                      <div style="flex:1;min-width:0">
                        <span class="badge" style="background:${color}15;color:${color};margin-bottom:6px">${tlabel}</span>
                        <div style="font-size:14px;font-weight:700;${!c.is_active?'text-decoration:line-through;color:var(--text-muted)':''}">${escHtml(c.label)}</div>
                        <div style="font-size:11px;color:var(--text-muted);font-style:italic;margin-top:2px">${escHtml(c.key)}</div>
                      </div>
                      ${isAdmin ? `<button class="btn btn-sm btn-red delete-criterio" data-id="${c.id}" data-label="${escHtml(c.label)}">🗑</button>` : ''}
                    </div>
                    <div style="display:flex;gap:20px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
                      <label class="toggle-wrap" style="cursor:${isAdmin?'pointer':'default'}">
                        <label class="toggle">
                          <input type="checkbox" class="crit-filter" data-id="${c.id}" ${c.show_in_filter?'checked':''} ${!isAdmin?'disabled':''}>
                          <span class="toggle-slider"></span>
                        </label>
                        <span style="font-size:12px;color:${c.show_in_filter?'var(--primary)':'var(--text-muted)'}">Aparece nos filtros do app</span>
                      </label>
                      <label class="toggle-wrap" style="cursor:${isAdmin?'pointer':'default'}">
                        <label class="toggle">
                          <input type="checkbox" class="crit-active" data-id="${c.id}" ${c.is_active?'checked':''} ${!isAdmin?'disabled':''}>
                          <span class="toggle-slider"></span>
                        </label>
                        <span style="font-size:12px;color:${c.is_active?'#059669':'var(--text-muted)'}">${c.is_active?'Ativo':'Inativo'}</span>
                      </label>
                    </div>
                  </div>
                `;
              }).join('')
          }
        `;

        pageContent.querySelectorAll('.crit-filter').forEach(chk => {
          chk.addEventListener('change', async () => {
            const id = chk.dataset.id;
            chk.disabled = true;
            try {
              const res = await apiFetch(`/admin/custom-criteria/${id}`, { method: 'PATCH', body: JSON.stringify({ show_in_filter: chk.checked }) });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderCriterios();
            } catch(e) { alert('Erro: ' + e.message); chk.checked = !chk.checked; chk.disabled = false; }
          });
        });

        pageContent.querySelectorAll('.crit-active').forEach(chk => {
          chk.addEventListener('change', async () => {
            const id = chk.dataset.id;
            chk.disabled = true;
            try {
              const res = await apiFetch(`/admin/custom-criteria/${id}`, { method: 'PATCH', body: JSON.stringify({ is_active: chk.checked }) });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderCriterios();
            } catch(e) { alert('Erro: ' + e.message); chk.checked = !chk.checked; chk.disabled = false; }
          });
        });

        pageContent.querySelectorAll('.delete-criterio').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id    = btn.dataset.id;
            const label = btn.dataset.label;
            if (!confirm(`Excluir "${label}"? Esta ação não pode ser desfeita e pode afetar reviews existentes.`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/custom-criteria/${id}`, { method: 'DELETE' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderCriterios();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        document.getElementById('new-criterio-btn')?.addEventListener('click', () => openNewCriterioModal());
      }

      function openNewCriterioModal() {
        openModal('Novo Critério', `
          <div class="field-group">
            <label class="field-label">Chave técnica *</label>
            <input class="field-input" id="nc-key" placeholder="ex: aceita_pet" />
            <p class="field-sub">Apenas letras minúsculas e underscores.</p>
          </div>
          <div class="field-group">
            <label class="field-label">Rótulo visível *</label>
            <input class="field-input" id="nc-label" placeholder="ex: Aceita Pet" />
          </div>
          <div class="field-group">
            <label class="field-label">Tipo do campo</label>
            <div class="pill-group" id="nc-type-pills">
              <button class="pill selected" data-type="boolean">Sim/Não</button>
              <button class="pill" data-type="number">Numérico</button>
              <button class="pill" data-type="text">Texto</button>
            </div>
          </div>
          <div class="field-group">
            <label class="toggle-wrap" style="cursor:pointer;gap:10px">
              <label class="toggle">
                <input type="checkbox" id="nc-filter" checked>
                <span class="toggle-slider"></span>
              </label>
              <span style="font-size:14px">Aparece nos filtros do app</span>
            </label>
          </div>
        `, `
          <button class="btn btn-gray" id="nc-cancel">Cancelar</button>
          <button class="btn btn-orange" id="nc-create">Criar Critério</button>
        `);

        let selectedType = 'boolean';

        document.querySelectorAll('#nc-type-pills .pill').forEach(p => {
          p.addEventListener('click', () => {
            selectedType = p.dataset.type;
            document.querySelectorAll('#nc-type-pills .pill').forEach(pp => pp.classList.remove('selected'));
            p.classList.add('selected');
          });
        });

        document.getElementById('nc-cancel').addEventListener('click', closeModal);

        document.getElementById('nc-create').addEventListener('click', async () => {
          const key   = document.getElementById('nc-key').value.trim().toLowerCase().replace(/\s+/g,'_');
          const label = document.getElementById('nc-label').value.trim();
          const showInFilter = document.getElementById('nc-filter').checked;

          if (!key || !label) { alert('Preencha a chave técnica e o rótulo.'); return; }
          if (!/^[a-z_]+$/.test(key)) { alert('A chave deve conter apenas letras minúsculas e underscores.'); return; }

          const createBtn = document.getElementById('nc-create');
          createBtn.disabled = true;
          createBtn.textContent = 'Criando…';
          try {
            const res = await apiFetch('/admin/custom-criteria', { method: 'POST', body: JSON.stringify({ key, label, field_type: selectedType, show_in_filter: showInFilter }) });
            const d   = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            closeModal();
            renderCriterios();
          } catch(e) {
            alert('Erro: ' + e.message);
            createBtn.disabled = false;
            createBtn.textContent = 'Criar Critério';
          }
        });
      }

      // =====================================================================
      // ===== MÓDULO: FILTROS DO APP ==========================================
      // =====================================================================
      async function renderFiltros() {
        pageContent.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        try {
          const res  = await apiFetch('/admin/filters');
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          renderFiltrosUI(data.filters || []);
        } catch(e) {
          pageContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderFiltrosUI(filters) {
        const isAdmin = adminUser?.role === 'admin' || adminUser?.role === 'colaborador';

        pageContent.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <h3 style="font-size:16px;font-weight:600">${filters.length} filtro${filters.length!==1?'s':''} cadastrado${filters.length!==1?'s':''}</h3>
            ${isAdmin ? '<button class="btn btn-orange" id="new-filtro-btn">+ Novo Filtro</button>' : ''}
          </div>

          ${filters.length === 0
            ? '<div class="empty-state"><div class="empty-state-icon">🔎</div><p>Nenhum filtro cadastrado</p></div>'
            : filters.map(f => {
                const now = new Date();
                const isExpired = f.seasonal && f.ends_at && new Date(f.ends_at) < now;
                return `
                  <div class="item-row" style="${!f.active?'opacity:0.6':''}">
                    <div class="item-avatar" style="background:${f.active?'var(--primary)':'#9ca3af'};font-size:20px;width:42px;height:42px">
                      ${f.icon ? `<span>${f.icon}</span>` : '🔎'}
                    </div>
                    <div class="item-info">
                      <div class="item-name">${escHtml(f.name)}</div>
                      <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
                        ${f.seasonal ? `<span class="badge" style="background:#f3e8ff;color:#7c3aed;font-size:10px">Sazonal</span>` : ''}
                        ${isExpired ? `<span class="badge" style="background:#fee2e2;color:#dc2626;font-size:10px">Expirado</span>` : ''}
                        ${f.seasonal && f.starts_at ? `<span style="font-size:11px;color:var(--text-muted)">${new Date(f.starts_at).toLocaleDateString('pt-BR')} – ${f.ends_at?new Date(f.ends_at).toLocaleDateString('pt-BR'):'?'}</span>` : ''}
                      </div>
                    </div>
                    <div class="item-actions">
                      ${isAdmin ? `<button class="btn btn-sm btn-gray edit-filtro" data-id="${f.id}">✏️</button>` : ''}
                      <label class="toggle" title="${f.active?'Desativar':'Ativar'}">
                        <input type="checkbox" class="filtro-toggle" data-id="${f.id}" ${f.active?'checked':''} ${!isAdmin?'disabled':''}>
                        <span class="toggle-slider"></span>
                      </label>
                    </div>
                  </div>
                `;
              }).join('')
          }
        `;

        pageContent.querySelectorAll('.filtro-toggle').forEach(chk => {
          chk.addEventListener('change', async () => {
            const id = chk.dataset.id;
            chk.disabled = true;
            try {
              const res = await apiFetch(`/admin/filters/${id}/toggle`, { method: 'PATCH' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderFiltros();
            } catch(e) { alert('Erro: ' + e.message); chk.checked = !chk.checked; chk.disabled = false; }
          });
        });

        pageContent.querySelectorAll('.edit-filtro').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            const f = filters.find(x => x.id === id);
            if (f) openFiltroModal(f);
          });
        });

        document.getElementById('new-filtro-btn')?.addEventListener('click', () => openFiltroModal(null));
      }

      function openFiltroModal(f) {
        const isNew = !f;
        openModal(isNew ? 'Novo Filtro' : 'Editar Filtro', `
          <div class="field-group">
            <label class="field-label">Nome *</label>
            <input class="field-input" id="f-name" value="${f?escHtml(f.name):''}" placeholder="Ex: Especial Férias" />
          </div>
          <div class="field-group">
            <label class="field-label">Ícone (emoji)</label>
            <input class="field-input" id="f-icon" value="${f&&f.icon?escHtml(f.icon):''}" placeholder="🎈" style="font-size:20px" maxlength="4" />
          </div>
          <div class="field-group">
            <label class="toggle-wrap" style="cursor:pointer;gap:10px">
              <label class="toggle"><input type="checkbox" id="f-seasonal" ${f&&f.seasonal?'checked':''}><span class="toggle-slider"></span></label>
              <span style="font-size:14px">Sazonal (com data de expiração)</span>
            </label>
          </div>
          <div id="f-dates-wrap" style="${f&&f.seasonal?'':'display:none'}">
            <div class="field-row">
              <div class="field-group">
                <label class="field-label">Data de início</label>
                <input class="field-input" id="f-starts" type="date" value="${f&&f.starts_at?f.starts_at.slice(0,10):''}" />
              </div>
              <div class="field-group">
                <label class="field-label">Data de fim</label>
                <input class="field-input" id="f-ends" type="date" value="${f&&f.ends_at?f.ends_at.slice(0,10):''}" />
              </div>
            </div>
          </div>
          <div class="field-group">
            <label class="toggle-wrap" style="cursor:pointer;gap:10px">
              <label class="toggle"><input type="checkbox" id="f-active" ${!f||f.active?'checked':''}><span class="toggle-slider"></span></label>
              <span style="font-size:14px">Ativo</span>
            </label>
          </div>
        `, `
          <button class="btn btn-gray" id="f-cancel">Cancelar</button>
          <button class="btn btn-orange" id="f-save">Salvar</button>
        `);

        document.getElementById('f-seasonal').addEventListener('change', e => {
          document.getElementById('f-dates-wrap').style.display = e.target.checked ? '' : 'none';
        });

        document.getElementById('f-cancel').addEventListener('click', closeModal);

        document.getElementById('f-save').addEventListener('click', async () => {
          const name     = document.getElementById('f-name').value.trim();
          const icon     = document.getElementById('f-icon').value.trim();
          const seasonal = document.getElementById('f-seasonal').checked;
          const active   = document.getElementById('f-active').checked;
          const startsAt = seasonal ? document.getElementById('f-starts').value : null;
          const endsAt   = seasonal ? document.getElementById('f-ends').value : null;

          if (!name) { alert('Nome é obrigatório'); return; }
          if (!icon) { alert('Ícone é obrigatório'); return; }

          const body = { name, icon, active, seasonal,
            starts_at: startsAt ? `${startsAt}T00:00:00.000Z` : null,
            ends_at:   endsAt   ? `${endsAt}T23:59:59.000Z`   : null,
          };

          const saveBtn = document.getElementById('f-save');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Salvando…';
          try {
            const res = f
              ? await apiFetch(`/admin/filters/${f.id}`, { method: 'PATCH', body: JSON.stringify(body) })
              : await apiFetch('/admin/filters', { method: 'POST', body: JSON.stringify(body) });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            closeModal();
            renderFiltros();
          } catch(e) {
            alert('Erro: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.textContent = 'Salvar';
          }
        });
      }

      // =====================================================================
      // ===== MÓDULO: GESTÃO DE CIDADES ======================================
      // =====================================================================
      let cidadesSearch = '';

      let cidadesPipelineLimit = 50;
      let cidadesAllData = [];

      async function renderCidades() {
        pageContent.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        try {
          const param = cidadesSearch ? `?search=${encodeURIComponent(cidadesSearch)}` : '';
          const res   = await apiFetch(`/admin/cities${param}`);
          const data  = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          cidadesAllData = data.cities || [];
          renderCidadesUI(cidadesAllData);
        } catch(e) {
          pageContent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderCidadesUI(cities) {
        const isAdmin = adminUser?.role === 'admin' || adminUser?.role === 'colaborador';
        const freqLabels = { diaria:'Diária', semanal:'Semanal', quinzenal:'Quinzenal', mensal:'Mensal' };

        pageContent.innerHTML = `
          <div class="search-bar" style="position:relative">
            <div class="ac-wrap" style="flex:1">
              <input class="search-input" id="cidade-search" placeholder="Pesquisar cidade brasileira para adicionar…" value="${escHtml(cidadesSearch)}" autocomplete="off" />
              <div class="ac-dropdown" id="cidade-ac-dropdown" style="display:none"></div>
            </div>
          </div>

          ${isAdmin ? `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg-card);border-radius:10px;margin-bottom:12px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted)">
              <input type="checkbox" id="cidade-select-all" style="width:16px;height:16px"> Todos
            </label>
            <div style="flex:1"></div>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted)">
              Limite: <input type="number" id="pipeline-limit" value="${cidadesPipelineLimit}" min="1" max="200" style="width:60px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px">
            </label>
            <button class="btn btn-sm" id="btn-pipeline-selected" disabled style="background:var(--primary);color:#fff">🔍 Buscar com IA (Selecionados)</button>
            <button class="btn btn-sm" id="btn-pipeline-all" style="background:#16a34a;color:#fff">🔍 Buscar Todos (IA)</button>
            <button class="btn btn-sm btn-gray" id="btn-blacklist-view">📋 Blacklist</button>
          </div>
          ` : ''}

          <div id="cidades-list">
          ${cities.length === 0
            ? '<div class="empty-state"><div class="empty-state-icon">🏙️</div><p>Nenhuma cidade cadastrada. Digite o nome de uma cidade acima para adicionar.</p></div>'
            : cities.map(c => `
                <div class="item-row" style="${!c.ativa?'opacity:0.6':''}">
                  ${isAdmin ? `<input type="checkbox" class="cidade-check" data-id="${c.id}" style="width:16px;height:16px;margin-right:8px;flex-shrink:0" ${!c.ativa?'disabled':''}>` : ''}
                  <div class="item-avatar" style="background:${c.ativa?'#2563EB':'#9ca3af'};font-size:20px;width:42px;height:42px">🏙️</div>
                  <div class="item-info">
                    <div class="item-name">${escHtml(c.nome)} <span style="font-weight:400;color:var(--text-muted)">${escHtml(c.estado)}</span></div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
                      ${c.raio_km}km · ${freqLabels[c.frequencia]||c.frequencia}
                      ${c.ultima_varredura
                        ? ' · <span style="background:#e0f2fe;color:#0369a1;padding:1px 6px;border-radius:4px;font-size:11px">🕐 ' + new Date(c.ultima_varredura).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) + '</span>'
                        : ' · <span style="background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:4px;font-size:11px">Nunca varrida</span>'}
                    </div>
                  </div>
                  <div class="item-actions">
                    ${isAdmin ? `<button class="btn btn-sm" style="background:#7c3aed;color:#fff" title="Buscar com IA" data-id="${c.id}" data-name="${escHtml(c.nome)}" data-run-pipeline>🔍</button>` : ''}
                    ${isAdmin ? `<button class="btn btn-sm btn-gray edit-cidade" data-id="${c.id}">✏️</button>` : ''}
                    ${isAdmin ? `<button class="btn btn-sm btn-red delete-cidade" data-id="${c.id}" data-name="${escHtml(c.nome)}">🗑</button>` : ''}
                    <label class="toggle" title="${c.ativa?'Desativar':'Ativar'}">
                      <input type="checkbox" class="cidade-toggle" data-id="${c.id}" ${c.ativa?'checked':''} ${!isAdmin?'disabled':''}>
                      <span class="toggle-slider"></span>
                    </label>
                  </div>
                </div>
              `).join('')
          }
          </div>

          <div id="pipeline-preview-area"></div>
        `;

        const limitInput = document.getElementById('pipeline-limit');
        if (limitInput) {
          limitInput.addEventListener('change', () => {
            cidadesPipelineLimit = Math.max(1, Math.min(200, parseInt(limitInput.value) || 50));
            limitInput.value = cidadesPipelineLimit;
          });
        }

        const selectAll = document.getElementById('cidade-select-all');
        if (selectAll) {
          selectAll.addEventListener('change', () => {
            pageContent.querySelectorAll('.cidade-check:not(:disabled)').forEach(chk => {
              chk.checked = selectAll.checked;
            });
            updateSelectedBtn();
          });
        }

        function updateSelectedBtn() {
          const btn = document.getElementById('btn-pipeline-selected');
          if (!btn) return;
          const checked = pageContent.querySelectorAll('.cidade-check:checked');
          btn.disabled = checked.length === 0;
          btn.textContent = checked.length > 0 ? `🔍 Buscar com IA (${checked.length})` : '🔍 Buscar com IA (Selecionados)';
        }

        pageContent.querySelectorAll('.cidade-check').forEach(chk => {
          chk.addEventListener('change', updateSelectedBtn);
        });

        const btnAll = document.getElementById('btn-pipeline-all');
        if (btnAll) {
          btnAll.addEventListener('click', async () => {
            const activeCities = cities.filter(c => c.ativa);
            if (activeCities.length === 0) { alert('Nenhuma cidade ativa.'); return; }
            if (!confirm(`Executar pipeline de preview para ${activeCities.length} cidade(s) ativa(s)?`)) return;
            await runPipelineBatch(activeCities, btnAll);
          });
        }

        const btnSelected = document.getElementById('btn-pipeline-selected');
        if (btnSelected) {
          btnSelected.addEventListener('click', async () => {
            const checkedIds = new Set();
            pageContent.querySelectorAll('.cidade-check:checked').forEach(chk => checkedIds.add(chk.dataset.id));
            const selectedCities = cities.filter(c => checkedIds.has(c.id));
            if (selectedCities.length === 0) return;
            await runPipelineBatch(selectedCities, btnSelected);
          });
        }

        const btnBlacklist = document.getElementById('btn-blacklist-view');
        if (btnBlacklist) {
          btnBlacklist.addEventListener('click', () => openBlacklistModal(cities));
        }

        pageContent.querySelectorAll('[data-run-pipeline]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const cityId = btn.dataset.id;
            const cityName = btn.dataset.name;
            const city = cities.find(c => c.id === cityId);
            if (city && !city.ativa) { alert('Cidade inativa. Ative antes de executar o pipeline.'); return; }
            await runPipelineBatch([city || { id: cityId, nome: cityName }], btn);
          });
        });

        // Page-level autocomplete for adding cities
        const pageSearchInput = document.getElementById('cidade-search');
        const pageDropdown = document.getElementById('cidade-ac-dropdown');
        let pageAcTimer = null;

        function closePageDropdown() {
          pageDropdown.style.display = 'none';
          pageDropdown.innerHTML = '';
        }

        function showPageDropdown(items) {
          if (!items.length) {
            pageDropdown.innerHTML = '<div class="ac-loading">Nenhuma cidade encontrada</div>';
            pageDropdown.style.display = 'block';
            return;
          }
          pageDropdown.innerHTML = items.map((s, i) =>
            `<div class="ac-item" data-idx="${i}" data-place-id="${escHtml(s.place_id)}" data-desc="${escHtml(s.description)}">${escHtml(s.description)}</div>`
          ).join('');
          pageDropdown.style.display = 'block';

          pageDropdown.querySelectorAll('.ac-item').forEach(el => {
            el.addEventListener('mousedown', async (e) => {
              e.preventDefault();
              const placeId = el.dataset.placeId;
              closePageDropdown();
              pageSearchInput.value = '';
              pageSearchInput.disabled = true;
              pageSearchInput.placeholder = 'Obtendo dados da cidade…';
              try {
                const gr = await apiFetch(`/admin/cities/geocode?place_id=${encodeURIComponent(placeId)}`);
                const gd = await gr.json();
                if (!gr.ok) throw new Error(gd.error || 'Erro no geocode');
                openCidadeModal(null, gd);
              } catch(err) {
                alert('Erro ao obter dados da cidade: ' + err.message);
              } finally {
                pageSearchInput.disabled = false;
                pageSearchInput.placeholder = 'Pesquisar cidade brasileira para adicionar…';
              }
            });
          });
        }

        pageSearchInput.addEventListener('input', () => {
          clearTimeout(pageAcTimer);
          const q = pageSearchInput.value.trim();
          cidadesSearch = q;
          if (q.length < 2) { closePageDropdown(); return; }
          pageDropdown.innerHTML = '<div class="ac-loading">Buscando cidades…</div>';
          pageDropdown.style.display = 'block';
          pageAcTimer = setTimeout(async () => {
            try {
              const r = await apiFetch(`/places/autocomplete?input=${encodeURIComponent(q)}`);
              const d = await r.json();
              showPageDropdown(d.suggestions || []);
            } catch { closePageDropdown(); }
          }, 300);
        });

        pageSearchInput.addEventListener('blur', () => {
          setTimeout(closePageDropdown, 200);
        });

        pageContent.querySelectorAll('.cidade-toggle').forEach(chk => {
          chk.addEventListener('change', async () => {
            const id = chk.dataset.id;
            chk.disabled = true;
            try {
              const res = await apiFetch(`/admin/cities/${id}/toggle`, { method: 'PATCH' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderCidades();
            } catch(e) { alert('Erro: ' + e.message); chk.checked = !chk.checked; chk.disabled = false; }
          });
        });

        pageContent.querySelectorAll('.edit-cidade').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            const city = cities.find(c => c.id === id);
            if (city) openCidadeModal(city);
          });
        });

        pageContent.querySelectorAll('.delete-cidade').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id   = btn.dataset.id;
            const name = btn.dataset.name;
            if (!confirm(`Excluir "${name}"? Esta ação não pode ser desfeita.`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/cities/${id}`, { method: 'DELETE' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              renderCidades();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });
      }

      // ── Pipeline 3-step flow ───────────────────────────────────────────

      function renderPipelineStepper(container, activeStep) {
        const steps = ['1. Buscar com IA', '2. Aplicar Critérios', '3. Inserir na Fila'];
        return `
          <div style="display:flex;align-items:center;gap:0;margin-bottom:16px">
            ${steps.map((s, i) => `
              <div style="display:flex;align-items:center;gap:0">
                <div style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
                  background:${i < activeStep ? '#dcfce7' : i === activeStep ? 'var(--primary)' : '#f3f4f6'};
                  color:${i < activeStep ? '#166534' : i === activeStep ? '#fff' : 'var(--text-muted)'}">
                  ${i < activeStep ? '✓ ' : ''}${s}
                </div>
                ${i < steps.length - 1 ? '<div style="width:28px;height:2px;background:#e5e7eb"></div>' : ''}
              </div>
            `).join('')}
          </div>`;
      }

      const TYPE_LABELS = {
        park:'Parque', playground:'Playground', restaurant:'Restaurante', cafe:'Café',
        bakery:'Padaria', shopping_mall:'Shopping', zoo:'Zoológico', amusement_center:'Diversão',
        tourist_attraction:'Atração', sports_club:'Esportes', community_center:'Centro Comunitário',
        amusement_park:'Parque de Diversão',
      };
      function getTypeLabel(types) {
        for (const t of types) { if (TYPE_LABELS[t]) return TYPE_LABELS[t]; }
        return types[0] || 'Local';
      }

      // Step 1: call ai-search and show raw results
      async function runPipelineBatch(cityList, triggerBtn) {
        const origText = triggerBtn.textContent;
        triggerBtn.disabled = true;
        triggerBtn.textContent = '⏳ Buscando com IA…';

        const previewArea = document.getElementById('pipeline-preview-area');
        if (previewArea) previewArea.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        const allPlaces = [];
        const errors = [];

        for (const city of cityList) {
          try {
            const res = await apiFetch('/admin/pipeline/ai-search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ city_id: city.id, limit: cidadesPipelineLimit }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erro');
            for (const p of data.places) {
              allPlaces.push({ ...p, city_id: city.id, city_name: data.city_name });
            }
          } catch (e) {
            errors.push(`${city.nome || city.id}: ${e.message}`);
          }
        }

        triggerBtn.disabled = false;
        triggerBtn.textContent = origText;

        if (previewArea) renderStep1(previewArea, allPlaces, cityList, errors);
      }

      function renderStep1(container, places, cityList, errors) {
        container.innerHTML = `
          <div style="margin-top:16px;padding:16px;background:var(--bg-card);border-radius:10px;border:1px solid var(--border)">
            ${renderPipelineStepper(container, 0)}
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
              <h3 style="margin:0;font-size:16px">🔍 Resultados da Busca com IA — ${places.length} lugar(es) encontrado(s)</h3>
              <div style="display:flex;gap:8px">
                <button class="btn btn-sm" id="step1-apply-criteria" style="background:var(--blue);color:#fff">📐 Aplicar Critérios (${places.length})</button>
                <button class="btn btn-sm btn-gray" id="step1-dismiss">✖ Fechar</button>
              </div>
            </div>
            ${errors.length > 0 ? `<div style="background:#fef2f2;color:#991b1b;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:13px">${errors.map(e => escHtml(e)).join('<br>')}</div>` : ''}
            ${places.length === 0
              ? '<div style="text-align:center;color:var(--text-muted);padding:20px">Nenhum resultado encontrado.</div>'
              : `<div style="max-height:440px;overflow-y:auto">
                  <table style="width:100%;border-collapse:collapse;font-size:13px">
                    <thead>
                      <tr style="border-bottom:2px solid var(--border);text-align:left">
                        <th style="padding:8px">Nome</th>
                        <th style="padding:8px">Endereço</th>
                        <th style="padding:8px">Tipo</th>
                        <th style="padding:8px">Nota</th>
                        <th style="padding:8px">Reviews</th>
                        <th style="padding:8px">Cidade</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${places.map(p => `
                        <tr style="border-bottom:1px solid var(--border)">
                          <td style="padding:8px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.name)}</td>
                          <td style="padding:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text-muted)">${escHtml(p.formatted_address || '')}</td>
                          <td style="padding:8px"><span style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">${escHtml(getTypeLabel(p.types))}</span></td>
                          <td style="padding:8px">${p.rating ? '⭐ ' + p.rating.toFixed(1) : '—'}</td>
                          <td style="padding:8px">${p.user_ratings_total || 0}</td>
                          <td style="padding:8px;font-size:12px">${escHtml(p.city_name)}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>`
            }
          </div>
        `;

        document.getElementById('step1-dismiss')?.addEventListener('click', () => {
          container.innerHTML = '';
          renderCidades();
        });

        document.getElementById('step1-apply-criteria')?.addEventListener('click', async () => {
          const btn = document.getElementById('step1-apply-criteria');
          btn.disabled = true;
          btn.textContent = '⏳ Aplicando…';
          await runApplyCriteria(container, places, cityList);
        });
      }

      // Step 2: call apply-criteria and show filtered results
      async function runApplyCriteria(container, rawPlaces, cityList) {
        container.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        const allCriteria = [];
        const errors = [];

        // group by city_id so we can send one request per city
        const byCity = {};
        for (const p of rawPlaces) {
          if (!byCity[p.city_id]) byCity[p.city_id] = { city_name: p.city_name, places: [] };
          byCity[p.city_id].places.push(p);
        }

        for (const [cityId, data] of Object.entries(byCity)) {
          try {
            const res = await apiFetch('/admin/pipeline/apply-criteria', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ city_id: cityId, city_name: data.city_name, places: data.places }),
            });
            const result = await res.json();
            if (!res.ok) throw new Error(result.error || 'Erro');
            for (const p of result.places) {
              allCriteria.push({ ...p, city_id: cityId, city_name: data.city_name });
            }
          } catch (e) {
            errors.push(`${data.city_name}: ${e.message}`);
          }
        }

        renderStep2(container, allCriteria, errors);
      }

      function renderStep2(container, places, errors) {
        const newPassing = places.filter(p => p.passed_criteria && !p.already_exists);
        const passed = places.filter(p => p.passed_criteria).length;
        const rejected = places.length - passed;

        container.innerHTML = `
          <div style="margin-top:16px;padding:16px;background:var(--bg-card);border-radius:10px;border:1px solid var(--border)">
            ${renderPipelineStepper(container, 1)}
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
              <h3 style="margin:0;font-size:16px">
                📐 Critérios Aplicados —
                <span style="color:#16a34a">${passed} aprovado(s)</span>,
                <span style="color:#dc2626">${rejected} rejeitado(s)</span>,
                <span style="color:#166534">${newPassing.length} novo(s) para fila</span>
              </h3>
              <div style="display:flex;gap:8px">
                <button class="btn btn-sm" id="step2-insert-all" style="background:#16a34a;color:#fff" ${newPassing.length === 0 ? 'disabled' : ''}>✅ Inserir na Fila (${newPassing.length})</button>
                <button class="btn btn-sm btn-gray" id="step2-neutral-all">⏸️ Neutralizar Todos</button>
                <button class="btn btn-sm btn-gray" id="step2-dismiss">✖ Fechar</button>
              </div>
            </div>
            ${errors.length > 0 ? `<div style="background:#fef2f2;color:#991b1b;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:13px">${errors.map(e => escHtml(e)).join('<br>')}</div>` : ''}
            ${places.length === 0
              ? '<div style="text-align:center;color:var(--text-muted);padding:20px">Nenhum resultado.</div>'
              : `<div style="max-height:440px;overflow-y:auto">
                  <table style="width:100%;border-collapse:collapse;font-size:13px">
                    <thead>
                      <tr style="border-bottom:2px solid var(--border);text-align:left">
                        <th style="padding:8px">Nome</th>
                        <th style="padding:8px">Tipo</th>
                        <th style="padding:8px">Nota</th>
                        <th style="padding:8px">Cidade</th>
                        <th style="padding:8px">Critérios</th>
                        <th style="padding:8px">Banco</th>
                        <th style="padding:8px;text-align:right">Ações</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${places.map((p, i) => `
                        <tr style="border-bottom:1px solid var(--border)" id="step2-row-${i}">
                          <td style="padding:8px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(p.formatted_address)}">${escHtml(p.name)}</td>
                          <td style="padding:8px"><span style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">${escHtml(getTypeLabel(p.types))}</span></td>
                          <td style="padding:8px">${p.rating ? '⭐ ' + p.rating.toFixed(1) : '—'}</td>
                          <td style="padding:8px;font-size:12px">${escHtml(p.city_name)}</td>
                          <td style="padding:8px">
                            ${p.passed_criteria
                              ? '<span style="background:#dcfce7;color:#166534;padding:2px 6px;border-radius:4px;font-size:11px">✓ Aprovado</span>'
                              : `<span style="background:#fee2e2;color:#991b1b;padding:2px 6px;border-radius:4px;font-size:11px" title="${escHtml(p.rejection_reason||'')}">✗ ${escHtml(p.rejection_reason||'Rejeitado')}</span>`}
                          </td>
                          <td style="padding:8px">
                            ${p.already_exists
                              ? '<span style="background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:4px;font-size:11px">Já existe</span>'
                              : '<span style="background:#f3f4f6;color:var(--text-muted);padding:2px 6px;border-radius:4px;font-size:11px">Novo</span>'}
                          </td>
                          <td style="padding:8px;text-align:right;white-space:nowrap">
                            ${p.passed_criteria && !p.already_exists ? `<button class="btn btn-sm" style="background:#16a34a;color:#fff;padding:2px 8px;font-size:11px" data-step2-approve="${i}" title="Inserir na fila">✅</button>` : ''}
                            <button class="btn btn-sm btn-gray" style="padding:2px 8px;font-size:11px" data-step2-neutral="${i}" title="Neutralizar">⏸️</button>
                            ${p.passed_criteria ? `<button class="btn btn-sm" style="background:#dc2626;color:#fff;padding:2px 8px;font-size:11px" data-step2-exclude="${i}" title="Blacklist">🚫</button>` : ''}
                          </td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>`
            }
          </div>
        `;

        document.getElementById('step2-dismiss')?.addEventListener('click', () => {
          container.innerHTML = '';
          renderCidades();
        });

        document.getElementById('step2-neutral-all')?.addEventListener('click', () => {
          container.querySelectorAll('[data-step2-neutral]').forEach(btn => {
            const row = document.getElementById('step2-row-' + btn.dataset.step2Neutral);
            if (row) row.style.display = 'none';
          });
        });

        document.getElementById('step2-insert-all')?.addEventListener('click', async () => {
          const btn = document.getElementById('step2-insert-all');
          btn.disabled = true;
          btn.textContent = '⏳ Inserindo…';
          await insertIntoQueue(container, places, newPassing);
        });

        container.querySelectorAll('[data-step2-approve]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const idx = parseInt(btn.dataset.step2Approve);
            const p = places[idx];
            if (!p || !p.passed_criteria || p.already_exists) return;
            btn.disabled = true;
            try {
              const res = await apiFetch('/admin/pipeline/triage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  city_id: p.city_id, city_name: p.city_name,
                  places: [{ place_id: p.place_id, name: p.name, formatted_address: p.formatted_address, types: p.types, lat: p.location.lat, lng: p.location.lng }],
                }),
              });
              if (res.ok) {
                const row = document.getElementById('step2-row-' + idx);
                if (row) {
                  row.style.opacity = '0.5';
                  const dbCell = row.querySelector('td:nth-child(6)');
                  if (dbCell) dbCell.innerHTML = '<span style="background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:4px;font-size:11px">Na fila</span>';
                }
                btn.remove();
              }
            } catch {}
          });
        });

        container.querySelectorAll('[data-step2-neutral]').forEach(btn => {
          btn.addEventListener('click', () => {
            const row = document.getElementById('step2-row-' + btn.dataset.step2Neutral);
            if (row) row.style.display = 'none';
          });
        });

        container.querySelectorAll('[data-step2-exclude]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const idx = parseInt(btn.dataset.step2Exclude);
            const p = places[idx];
            if (!p) return;
            btn.disabled = true;
            try {
              const res = await apiFetch('/admin/blacklist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  items: [{ place_id: p.place_id, city_id: p.city_id, city_name: p.city_name, nome: p.name, tipo: p.types[0] || '' }],
                }),
              });
              if (res.ok) {
                const row = document.getElementById('step2-row-' + idx);
                if (row) row.style.display = 'none';
              }
            } catch {}
          });
        });
      }

      // Step 3: insert passing new places into the queue via triage
      async function insertIntoQueue(container, allPlaces, newPassing) {
        const byCity = {};
        for (const p of newPassing) {
          const row = document.getElementById('step2-row-' + allPlaces.indexOf(p));
          if (row && row.style.display === 'none') continue;
          if (!byCity[p.city_id]) byCity[p.city_id] = { city_name: p.city_name, places: [] };
          byCity[p.city_id].places.push({
            place_id: p.place_id, name: p.name, formatted_address: p.formatted_address,
            types: p.types, lat: p.location.lat, lng: p.location.lng,
          });
        }

        let totalInserted = 0;
        for (const [cityId, data] of Object.entries(byCity)) {
          try {
            const res = await apiFetch('/admin/pipeline/triage', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ city_id: cityId, city_name: data.city_name, places: data.places }),
            });
            const result = await res.json();
            if (res.ok) totalInserted += result.inserted;
          } catch {}
        }

        // show step 3 confirmation
        const previewArea = document.getElementById('pipeline-preview-area');
        if (previewArea) {
          previewArea.innerHTML = `
            <div style="margin-top:16px;padding:24px;background:var(--bg-card);border-radius:10px;border:1px solid var(--border);text-align:center">
              ${renderPipelineStepper(null, 2)}
              <div style="font-size:40px;margin:16px 0">✅</div>
              <h3 style="margin:0 0 8px;font-size:18px;color:#16a34a">${totalInserted} lugar(es) inserido(s) na fila!</h3>
              <p style="color:var(--text-muted);margin:0 0 20px;font-size:14px">Os lugares estão aguardando curadoria na fila de aprovação.</p>
              <div style="display:flex;gap:8px;justify-content:center">
                <button class="btn btn-sm" id="step3-go-curadoria" style="background:var(--primary);color:#fff">📋 Ir para Curadoria</button>
                <button class="btn btn-sm btn-gray" id="step3-dismiss">✖ Fechar</button>
              </div>
            </div>
          `;
          document.getElementById('step3-dismiss')?.addEventListener('click', () => {
            previewArea.innerHTML = '';
            renderCidades();
          });
          document.getElementById('step3-go-curadoria')?.addEventListener('click', () => {
            previewArea.innerHTML = '';
            navigateTo('curadoria');
          });
        }
      }

      async function openBlacklistModal(allCities) {
        let blCityFilter = '';
        let blSearchFilter = '';

        async function loadAndRender() {
          const params = new URLSearchParams();
          if (blCityFilter) params.set('city_id', blCityFilter);
          if (blSearchFilter) params.set('search', blSearchFilter);
          const qs = params.toString() ? '?' + params.toString() : '';

          try {
            const res = await apiFetch(`/admin/blacklist${qs}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erro');
            renderBlacklistContent(data.items || []);
          } catch(e) {
            document.getElementById('bl-content').innerHTML = `<p style="color:red">${escHtml(e.message)}</p>`;
          }
        }

        function renderBlacklistContent(items) {
          const blContent = document.getElementById('bl-content');
          if (!blContent) return;
          blContent.innerHTML = items.length === 0
            ? '<div style="text-align:center;color:var(--text-muted);padding:20px">Nenhum item na blacklist.</div>'
            : `<div style="max-height:400px;overflow-y:auto">
                <table style="width:100%;border-collapse:collapse;font-size:13px">
                  <thead>
                    <tr style="border-bottom:2px solid var(--border);text-align:left">
                      <th style="padding:8px">Nome</th>
                      <th style="padding:8px">Tipo</th>
                      <th style="padding:8px">Cidade</th>
                      <th style="padding:8px">Excluído em</th>
                      <th style="padding:8px;text-align:right">Ação</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${items.map(item => `
                      <tr style="border-bottom:1px solid var(--border)" id="bl-row-${item.id}">
                        <td style="padding:8px">${escHtml(item.nome)}</td>
                        <td style="padding:8px"><span style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:11px">${escHtml(item.tipo || '—')}</span></td>
                        <td style="padding:8px;font-size:12px">${escHtml(item.city_name || '—')}</td>
                        <td style="padding:8px;font-size:12px">${new Date(item.excluido_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})}</td>
                        <td style="padding:8px;text-align:right">
                          <button class="btn btn-sm" style="background:#16a34a;color:#fff;padding:2px 8px;font-size:11px" data-bl-restore="${item.id}" title="Restaurar (remover da blacklist)">♻️ Restaurar</button>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>`;

          blContent.querySelectorAll('[data-bl-restore]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const id = btn.dataset.blRestore;
              btn.disabled = true;
              try {
                const res = await apiFetch(`/admin/blacklist/${id}`, { method: 'DELETE' });
                if (res.ok) {
                  const row = document.getElementById('bl-row-' + id);
                  if (row) row.remove();
                }
              } catch {}
            });
          });
        }

        const cityOptions = (allCities || []).map(c =>
          `<option value="${c.id}" ${c.id === blCityFilter ? 'selected' : ''}>${escHtml(c.nome)} — ${escHtml(c.estado)}</option>`
        ).join('');

        openModal('📋 Blacklist do Pipeline', `
          <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
            <select id="bl-city-filter" style="flex:1;min-width:160px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px">
              <option value="">Todas as cidades</option>
              ${cityOptions}
            </select>
            <input id="bl-search-filter" type="text" placeholder="Buscar por nome…" value="${escHtml(blSearchFilter)}" style="flex:1;min-width:160px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px">
          </div>
          <div id="bl-content"><div class="spinner-wrap"><div class="spinner"></div></div></div>
        `, null, true);

        loadAndRender();

        let blTimer = null;
        document.getElementById('bl-city-filter')?.addEventListener('change', (e) => {
          blCityFilter = e.target.value;
          loadAndRender();
        });
        document.getElementById('bl-search-filter')?.addEventListener('input', (e) => {
          clearTimeout(blTimer);
          blSearchFilter = e.target.value.trim();
          blTimer = setTimeout(loadAndRender, 300);
        });
      }

      async function openCidadeModal(city, prefilledGeocode) {
        const isNew = !city;
        const prefill = prefilledGeocode || null;

        let initialPrompt = '';
        if (city && city.parametros_prompt && city.parametros_prompt.system_prompt) {
          initialPrompt = city.parametros_prompt.system_prompt;
        } else {
          try {
            const pr = await apiFetch('/admin/cities/active-prompt');
            if (pr.ok) {
              const pd = await pr.json();
              initialPrompt = pd.prompt || '';
            }
          } catch(e) { initialPrompt = ''; }
        }

        const displayName = prefill ? (prefill.nome + ', ' + prefill.estado) : (city ? escHtml(city.nome) + (city.estado ? ', ' + escHtml(city.estado) : '') : '');
        const badgeName = prefill ? (escHtml(prefill.nome) + ' — ' + escHtml(prefill.estado)) : (city ? escHtml(city.nome) + ' — ' + escHtml(city.estado) : '');
        const hasPrefill = prefill || city;

        openModal(isNew ? 'Nova Cidade' : 'Editar Cidade', `
          <div class="field-group">
            <label class="field-label">Cidade *</label>
            <div class="ac-wrap">
              <input class="field-input" id="cid-search" autocomplete="off"
                value="${displayName}"
                placeholder="Digite o nome da cidade…" />
              <div class="ac-dropdown" id="cid-dropdown" style="display:none"></div>
            </div>
            <div id="cid-selected-info" style="display:${hasPrefill?'block':'none'}">
              <span class="ac-selected-badge">✓ ${badgeName}</span>
            </div>
