          </div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Raio (km)</label>
              <input class="field-input" id="cid-raio" type="number" value="${city?city.raio_km:20}" min="1" max="200" />
            </div>
            <div class="field-group">
              <label class="field-label">Ativo</label>
              <label class="toggle-wrap" style="cursor:pointer;gap:10px;margin-top:10px">
                <label class="toggle"><input type="checkbox" id="cid-ativa" ${!city||city.ativa?'checked':''}><span class="toggle-slider"></span></label>
                <span style="font-size:14px">Ativa</span>
              </label>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Frequência de varredura</label>
            <div class="pill-group" id="cid-freq-pills">
              ${['diaria','semanal','quinzenal','mensal'].map(freq => {
                const labels = { diaria:'Diária', semanal:'Semanal', quinzenal:'Quinzenal', mensal:'Mensal' };
                const selected = city ? city.frequencia === freq : freq === 'semanal';
                return `<button class="pill${selected?' selected':''}" data-freq="${freq}">${labels[freq]}</button>`;
              }).join('')}
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Prompt desta cidade</label>
            <textarea class="field-input" id="cid-prompt" rows="8" placeholder="Prompt de IA personalizado para esta cidade…"></textarea>
            <p class="field-sub">Pré-preenchido com o System Prompt global. Edite para personalizar a busca nesta cidade.</p>
          </div>
        `, `
          <button class="btn btn-gray" id="cid-cancel">Cancelar</button>
          <button class="btn btn-orange" id="cid-save">Salvar</button>
        `, true);

        // Set prompt value programmatically to avoid template literal escaping issues
        document.getElementById('cid-prompt').value = initialPrompt;

        let resolvedCity = prefill ? {
          nome: prefill.nome,
          estado: prefill.estado,
          latitude: prefill.latitude,
          longitude: prefill.longitude,
        } : city ? {
          nome: city.nome,
          estado: city.estado,
          latitude: city.latitude,
          longitude: city.longitude,
        } : null;

        let selectedFreq = city ? city.frequencia : 'semanal';
        let acTimer = null;

        // Frequency pills
        document.querySelectorAll('#cid-freq-pills .pill').forEach(p => {
          p.addEventListener('click', () => {
            selectedFreq = p.dataset.freq;
            document.querySelectorAll('#cid-freq-pills .pill').forEach(pp => pp.classList.remove('selected'));
            p.classList.add('selected');
          });
        });

        // Autocomplete logic
        const searchInput = document.getElementById('cid-search');
        const dropdown = document.getElementById('cid-dropdown');
        const selectedInfo = document.getElementById('cid-selected-info');

        function closeDropdown() {
          dropdown.style.display = 'none';
          dropdown.innerHTML = '';
        }

        function showDropdown(items) {
          if (!items.length) { closeDropdown(); return; }
          dropdown.innerHTML = items.map((s, i) =>
            `<div class="ac-item" data-idx="${i}" data-place-id="${escHtml(s.place_id)}" data-desc="${escHtml(s.description)}">${escHtml(s.description)}</div>`
          ).join('');
          dropdown.style.display = 'block';

          dropdown.querySelectorAll('.ac-item').forEach(el => {
            el.addEventListener('mousedown', async (e) => {
              e.preventDefault();
              const placeId = el.dataset.placeId;
              const desc = el.dataset.desc;
              closeDropdown();
              searchInput.value = desc;
              searchInput.disabled = true;
              selectedInfo.innerHTML = '<span class="ac-loading">Obtendo coordenadas…</span>';
              selectedInfo.style.display = 'block';
              try {
                const gr = await apiFetch(`/admin/cities/geocode?place_id=${encodeURIComponent(placeId)}`);
                const gd = await gr.json();
                if (!gr.ok) throw new Error(gd.error || 'Erro no geocode');
                resolvedCity = gd;
                searchInput.value = gd.nome + ', ' + gd.estado;
                selectedInfo.innerHTML = `<span class="ac-selected-badge">✓ ${escHtml(gd.nome)} — ${escHtml(gd.estado)}</span>`;
              } catch(e) {
                selectedInfo.innerHTML = `<span style="color:var(--danger,#e53e3e);font-size:12px">Erro: ${escHtml(e.message)}</span>`;
                resolvedCity = null;
              } finally {
                searchInput.disabled = false;
              }
            });
          });
        }

        searchInput.addEventListener('input', () => {
          resolvedCity = null;
          selectedInfo.style.display = 'none';
          clearTimeout(acTimer);
          const q = searchInput.value.trim();
          if (q.length < 2) { closeDropdown(); return; }
          dropdown.innerHTML = '<div class="ac-loading">Buscando…</div>';
          dropdown.style.display = 'block';
          acTimer = setTimeout(async () => {
            try {
              const r = await apiFetch(`/places/autocomplete?input=${encodeURIComponent(q)}`);
              const d = await r.json();
              showDropdown(d.suggestions || []);
            } catch { closeDropdown(); }
          }, 300);
        });

        searchInput.addEventListener('blur', () => {
          setTimeout(closeDropdown, 150);
        });

        document.getElementById('cid-cancel').addEventListener('click', closeModal);

        document.getElementById('cid-save').addEventListener('click', async () => {
          // For new cities, a selection via autocomplete is required
          if (isNew && !resolvedCity) {
            alert('Selecione uma cidade válida na lista de sugestões.');
            return;
          }

          const nome   = resolvedCity ? resolvedCity.nome   : city.nome;
          const estado = resolvedCity ? resolvedCity.estado : city.estado;
          const lat    = resolvedCity ? resolvedCity.latitude  : (city.latitude  != null ? parseFloat(city.latitude)  : null);
          const lng    = resolvedCity ? resolvedCity.longitude : (city.longitude != null ? parseFloat(city.longitude) : null);
          const raio   = parseInt(document.getElementById('cid-raio').value, 10);
          const ativa  = document.getElementById('cid-ativa').checked;
          const promptText = document.getElementById('cid-prompt').value.trim();

          if (!nome || !estado) { alert('Nome e estado são obrigatórios.'); return; }

          // Build parametros_prompt preserving any existing keys, overriding system_prompt
          let parametros_prompt = city && city.parametros_prompt ? { ...city.parametros_prompt } : {};
          if (promptText) {
            parametros_prompt.system_prompt = promptText;
          } else {
            delete parametros_prompt.system_prompt;
          }
          if (!Object.keys(parametros_prompt).length) parametros_prompt = null;

          const body = { nome, estado, latitude: lat, longitude: lng, raio_km: raio||20, frequencia: selectedFreq, ativa, parametros_prompt };

          const saveBtn = document.getElementById('cid-save');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Salvando…';
          try {
            const res = city
              ? await apiFetch(`/admin/cities/${city.id}`, { method: 'PATCH', body: JSON.stringify(body) })
              : await apiFetch('/admin/cities', { method: 'POST', body: JSON.stringify(body) });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            closeModal();
            renderCidades();
          } catch(e) {
            alert('Erro: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.textContent = 'Salvar';
          }
        });
      }

      // =====================================================================
      // ===== MÓDULO: FILA DE CURADORIA (Módulos 5 e 6) =====================
      // =====================================================================
      let curationMainTab      = 'fila'; // 'fila' | 'publicados'
      let curationStatusFilter = 'pendente';
      let curationCityFilter   = '';
      let curationCatFilter    = '';
      let curationMinScore     = '';
      let curationMaxScore     = '';
      let curationOffset       = 0;
      let curFilaPlaceType     = null; // null | 'comer' | 'parques'
      const CURATION_LIMIT     = 10;
      let publishedCityId      = '';
      let publishedCityName    = '';

      async function renderCuradoria() {
        pageContent.innerHTML = `
          <div class="mod-header">
            <h2>🔍 Fila de Curadoria</h2>
          </div>
          <div class="tabs-row" id="curation-main-tabs" style="margin-bottom:16px">
            <button class="tab-btn ${curationMainTab==='fila'?'active':''}" data-main="fila">🔍 Fila de Curadoria</button>
            <button class="tab-btn ${curationMainTab==='publicados'?'active':''}" data-main="publicados">📍 Locais Publicados</button>
          </div>
          <div id="curation-main-content"></div>
        `;

        pageContent.querySelectorAll('.tab-btn[data-main]').forEach(btn => {
          btn.addEventListener('click', () => {
            curationMainTab = btn.dataset.main;
            pageContent.querySelectorAll('.tab-btn[data-main]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCurationMainContent();
          });
        });

        renderCurationMainContent();
      }

      function renderCurationMainContent() {
        const el = document.getElementById('curation-main-content');
        if (!el) return;
        if (curationMainTab === 'publicados') {
          renderPublishedTab(el);
        } else {
          renderFilaTab(el);
        }
      }

      function renderFilaTab(container) {
        container.innerHTML = `
          <div class="tabs-row" id="curation-tabs">
            <button class="tab-btn ${curationStatusFilter==='pendente'?'active':''}" data-cstatus="pendente">⏳ Pendentes <span id="pending-count-tab"></span></button>
            <button class="tab-btn ${curationStatusFilter==='aprovado'?'active':''}" data-cstatus="aprovado">✅ Aprovados</button>
            <button class="tab-btn ${curationStatusFilter==='rejeitado'?'active':''}" data-cstatus="rejeitado">❌ Rejeitados</button>
          </div>

          <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <button class="btn ${curFilaPlaceType===null?'btn-orange':'btn-gray'}" id="c-type-all">Todos</button>
            <button class="btn ${curFilaPlaceType==='comer'?'btn-orange':'btn-gray'}" id="c-type-comer">🍽 Comer</button>
            <button class="btn ${curFilaPlaceType==='parques'?'btn-orange':'btn-gray'}" id="c-type-parques">🌳 Parques</button>
          </div>

          <div class="search-bar" style="flex-wrap:wrap;gap:8px;margin-bottom:16px">
            <input class="search-input" id="c-city" placeholder="Filtrar por cidade…" value="${escHtml(curationCityFilter)}" style="min-width:150px;flex:1" />
            <input class="search-input" id="c-cat" placeholder="Categoria…" value="${escHtml(curationCatFilter)}" style="min-width:130px;flex:1" />
            <input class="search-input" id="c-min" placeholder="KidScore mín" value="${escHtml(curationMinScore)}" style="min-width:120px;max-width:140px" type="number" min="0" max="100" />
            <input class="search-input" id="c-max" placeholder="KidScore máx" value="${escHtml(curationMaxScore)}" style="min-width:120px;max-width:140px" type="number" min="0" max="100" />
            <button class="btn btn-orange" id="c-filter-btn">Filtrar</button>
            <button class="btn btn-gray"   id="c-reset-btn">Limpar</button>
          </div>

          <div id="curation-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
          <div id="curation-pagination" style="display:flex;gap:8px;justify-content:center;margin-top:16px"></div>
        `;

        container.querySelectorAll('.tab-btn[data-cstatus]').forEach(btn => {
          btn.addEventListener('click', () => {
            curationStatusFilter = btn.dataset.cstatus;
            curationOffset = 0;
            container.querySelectorAll('.tab-btn[data-cstatus]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadCurationList();
          });
        });

        document.getElementById('c-type-all').addEventListener('click', () => {
          curFilaPlaceType = null;
          renderFilaTab(container);
        });
        document.getElementById('c-type-comer').addEventListener('click', () => {
          curFilaPlaceType = 'comer';
          renderFilaTab(container);
        });
        document.getElementById('c-type-parques').addEventListener('click', () => {
          curFilaPlaceType = 'parques';
          renderFilaTab(container);
        });

        document.getElementById('c-filter-btn').addEventListener('click', () => {
          curationCityFilter  = document.getElementById('c-city').value.trim();
          curationCatFilter   = document.getElementById('c-cat').value.trim();
          curationMinScore    = document.getElementById('c-min').value.trim();
          curationMaxScore    = document.getElementById('c-max').value.trim();
          curationOffset      = 0;
          loadCurationList();
        });

        document.getElementById('c-reset-btn').addEventListener('click', () => {
          curationCityFilter = curationCatFilter = curationMinScore = curationMaxScore = '';
          curationOffset = 0;
          document.getElementById('c-city').value = '';
          document.getElementById('c-cat').value  = '';
          document.getElementById('c-min').value  = '';
          document.getElementById('c-max').value  = '';
          loadCurationList();
        });

        loadCurationList();
      }

      async function renderPublishedTab(container) {
        container.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
        try {
          const res  = await apiFetch('/admin/cities');
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          const activeCities = (data.cities || []).filter(c => c.ativa);

          if (activeCities.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏙️</div><p>Nenhuma cidade habilitada.</p></div>`;
            return;
          }

          if (!publishedCityId || !activeCities.find(c => c.id === publishedCityId)) {
            publishedCityId   = activeCities[0].id;
            publishedCityName = activeCities[0].nome;
          }

          const cityOptions = activeCities.map(c =>
            `<option value="${escHtml(c.id)}" ${c.id === publishedCityId ? 'selected' : ''}>${escHtml(c.nome)}</option>`
          ).join('');

          container.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
              <select class="field-input" id="pub-city-select" style="max-width:260px">
                ${cityOptions}
              </select>
              <button class="btn btn-orange" id="pub-add-btn">+ Adicionar local</button>
            </div>
            <div id="published-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
          `;

          document.getElementById('pub-city-select').addEventListener('change', (e) => {
            publishedCityId   = e.target.value;
            publishedCityName = activeCities.find(c => c.id === publishedCityId)?.nome || '';
            loadPublishedList();
          });

          document.getElementById('pub-add-btn').addEventListener('click', () => openAddToPublishedModal());

          loadPublishedList();
        } catch(e) {
          container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      async function loadPublishedList() {
        const listEl = document.getElementById('published-list');
        if (!listEl || !publishedCityId) return;
        listEl.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
        try {
          const res  = await apiFetch(`/admin/published/places?city_id=${encodeURIComponent(publishedCityId)}`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          renderPublishedList(data.places || []);
        } catch(e) {
          listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderPublishedList(places) {
        const listEl = document.getElementById('published-list');
        if (!listEl) return;

        if (places.length === 0) {
          listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📍</div><p>Nenhum local publicado nesta cidade.</p></div>`;
          return;
        }

        const isAnalista = adminUser?.role === 'analista';

        listEl.innerHTML = places.map((item, idx) => {
          const score      = item.kid_score ?? null;
          const scoreColor = score === null ? '#9ca3af' : score >= 70 ? '#059669' : score >= 40 ? '#D97706' : '#DC2626';
          return `
            <div class="card" style="margin-bottom:12px;display:flex;align-items:center;gap:12px;padding:14px 16px" data-place-id="${escHtml(item.place_id)}">
              <!-- Position controls -->
              <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
                <span style="font-size:11px;color:var(--text-muted);text-align:center;font-weight:600">#${idx + 1}</span>
                ${!isAnalista ? `
                  <button class="btn btn-sm" style="padding:3px 8px;font-size:12px" data-up="${escHtml(item.place_id)}" data-idx="${idx}" ${idx === 0 ? 'disabled' : ''} title="Subir">▲</button>
                  <button class="btn btn-sm" style="padding:3px 8px;font-size:12px" data-down="${escHtml(item.place_id)}" data-idx="${idx}" ${idx === places.length - 1 ? 'disabled' : ''} title="Descer">▼</button>
                ` : ''}
              </div>
              <!-- Photo -->
              <div style="width:56px;height:56px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#f3f4f6;display:flex;align-items:center;justify-content:center">
                ${item.cover_photo_url
                  ? `<img src="${escHtml(item.cover_photo_url)}" alt="foto" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
                  : `<span style="font-size:22px">🏪</span>`
                }
              </div>
              <!-- Info -->
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
                  <span style="font-size:14px;font-weight:700">${escHtml(item.name || item.place_id)}</span>
                  ${item.category ? `<span class="badge" style="background:#e0f2fe;color:#0369a1">${escHtml(item.category)}</span>` : ''}
                  ${score !== null ? `<span class="badge" style="background:${scoreColor}18;color:${scoreColor}">KidScore ${score}</span>` : ''}
                  ${item.is_sponsored ? `<span class="badge" style="background:#fff3ef;color:#FF6B35">⭐ Parceiro</span>` : ''}
                </div>
                ${item.address ? `<div style="font-size:12px;color:var(--text-muted)">📍 ${escHtml(item.address)}</div>` : ''}
              </div>
              <!-- Remove -->
              ${!isAnalista ? `
                <button class="btn btn-red btn-sm pub-remove-btn" style="flex-shrink:0" data-id="${escHtml(item.place_id)}" data-name="${escHtml(item.name||item.place_id)}">✕ Remover</button>
              ` : ''}
            </div>
          `;
        }).join('');

        // Up/Down buttons
        listEl.querySelectorAll('[data-up]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const placeId = btn.dataset.up;
            const idx     = parseInt(btn.dataset.idx);
            if (idx === 0) return;
            btn.disabled = true;
            const above = places[idx - 1];
            const curr  = places[idx];
            try {
              await Promise.all([
                apiFetch(`/admin/published/${encodeURIComponent(placeId)}/order`, { method: 'PATCH', body: JSON.stringify({ order: above.display_order ?? idx - 1 }) }),
                apiFetch(`/admin/published/${encodeURIComponent(above.place_id)}/order`, { method: 'PATCH', body: JSON.stringify({ order: curr.display_order ?? idx }) }),
              ]);
              loadPublishedList();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        listEl.querySelectorAll('[data-down]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const placeId = btn.dataset.down;
            const idx     = parseInt(btn.dataset.idx);
            if (idx >= places.length - 1) return;
            btn.disabled = true;
            const below = places[idx + 1];
            const curr  = places[idx];
            try {
              await Promise.all([
                apiFetch(`/admin/published/${encodeURIComponent(placeId)}/order`, { method: 'PATCH', body: JSON.stringify({ order: below.display_order ?? idx + 1 }) }),
                apiFetch(`/admin/published/${encodeURIComponent(below.place_id)}/order`, { method: 'PATCH', body: JSON.stringify({ order: curr.display_order ?? idx }) }),
              ]);
              loadPublishedList();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        // Remove buttons
        listEl.querySelectorAll('.pub-remove-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const placeId = btn.dataset.id;
            const name    = btn.dataset.name;
            if (!confirm(`Remover "${name}" da lista publicada? O local voltará para pendente.`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/published/${encodeURIComponent(placeId)}`, { method: 'DELETE' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              loadPublishedList();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });
      }

      function openAddToPublishedModal() {
        openModal(
          `Adicionar local — ${escHtml(publishedCityName)}`,
          `
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
              Busque um estabelecimento no Google Places e adicione-o à lista publicada desta cidade.
            </p>
            <div style="position:relative;margin-bottom:16px">
              <input
                class="search-input"
                id="add-pub-q"
                placeholder="Nome do local (ex: Parque Villa-Lobos)…"
                autocomplete="off"
                style="width:100%;box-sizing:border-box"
              />
              <div id="add-pub-autocomplete" style="
                display:none;position:absolute;top:100%;left:0;right:0;z-index:999;
                background:var(--card);border:1px solid var(--border);border-radius:8px;
                box-shadow:0 4px 16px rgba(0,0,0,.15);max-height:260px;overflow-y:auto;margin-top:4px
              "></div>
            </div>
            <div id="add-pub-preview" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:4px"></div>
            <div id="add-pub-status" style="font-size:12px;color:var(--text-muted);min-height:18px"></div>
          `,
          `
            <button class="btn btn-gray" id="add-pub-cancel">Fechar</button>
            <button class="btn btn-green" id="add-pub-confirm" disabled>+ Confirmar adição</button>
          `,
          false,
        );

        document.getElementById('add-pub-cancel').addEventListener('click', closeModal);

        let selectedPlace = null;
        let autocompleteTimer = null;
        const inputEl    = document.getElementById('add-pub-q');
        const dropEl     = document.getElementById('add-pub-autocomplete');
        const previewEl  = document.getElementById('add-pub-preview');
        const statusEl   = document.getElementById('add-pub-status');
        const confirmBtn = document.getElementById('add-pub-confirm');

        function setStatus(msg) { statusEl.textContent = msg; }

        function clearSelection() {
          selectedPlace = null;
          previewEl.style.display = 'none';
          previewEl.innerHTML = '';
          confirmBtn.disabled = true;
        }

        function showPreview(place) {
          const photoRef = place.photos?.[0]?.photo_reference;
          const photoSrc = photoRef
            ? `/api/places/photo?reference=${encodeURIComponent(photoRef)}&maxwidth=120`
            : null;
          const typeLabel = (place.types?.[0] || '').replace(/_/g, ' ');
          previewEl.innerHTML = `
            <div style="display:flex;gap:12px;align-items:flex-start">
              ${photoSrc
                ? `<img src="${photoSrc}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0" onerror="this.style.display='none'">`
                : `<div style="width:72px;height:72px;border-radius:8px;background:var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px">📍</div>`
              }
              <div style="min-width:0">
                <div style="font-weight:700;font-size:14px;margin-bottom:3px">${escHtml(place.name)}</div>
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">${escHtml(place.formatted_address || '')}</div>
                ${typeLabel ? `<span style="font-size:11px;background:var(--orange);color:#fff;border-radius:4px;padding:2px 7px">${escHtml(typeLabel)}</span>` : ''}
              </div>
            </div>
          `;
          previewEl.style.display = 'block';
        }

        async function fetchDetails(placeId) {
          setStatus('Carregando detalhes…');
          try {
            const res  = await apiFetch(`/admin/google-places/details/${encodeURIComponent(placeId)}`);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erro ao buscar detalhes');
            selectedPlace = data.place;
            showPreview(selectedPlace);
            confirmBtn.disabled = false;
            setStatus('');
          } catch(e) {
            setStatus('Erro: ' + e.message);
            clearSelection();
          }
        }

        function renderDropdown(suggestions) {
          if (!suggestions || suggestions.length === 0) {
            dropEl.style.display = 'none';
            return;
          }
          dropEl.innerHTML = suggestions.map((s, i) => `
            <div
              class="add-pub-suggestion"
              data-idx="${i}"
              style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s"
              onmouseenter="this.style.background='var(--bg)'"
              onmouseleave="this.style.background=''"
            >
              <div style="font-weight:600;font-size:13px">${escHtml(s.main_text)}</div>
              <div style="font-size:11px;color:var(--text-muted)">${escHtml(s.secondary_text)}</div>
            </div>
          `).join('');

          dropEl.querySelectorAll('.add-pub-suggestion').forEach((el, i) => {
            el.addEventListener('mousedown', async (e) => {
              e.preventDefault();
              const s = suggestions[i];
              inputEl.value = s.main_text;
              dropEl.style.display = 'none';
              clearSelection();
              await fetchDetails(s.place_id);
            });
          });
          dropEl.style.display = 'block';
        }

        async function fetchAutocomplete(val) {
          if (val.length < 2) { dropEl.style.display = 'none'; return; }
          try {
            const res  = await apiFetch(`/admin/google-places/autocomplete?input=${encodeURIComponent(val)}`);
            const data = await res.json();
            renderDropdown(data.suggestions || []);
          } catch { dropEl.style.display = 'none'; }
        }

        inputEl.addEventListener('input', () => {
          clearSelection();
          clearTimeout(autocompleteTimer);
          const val = inputEl.value.trim();
          if (val.length < 2) { dropEl.style.display = 'none'; return; }
          setStatus('Buscando sugestões…');
          autocompleteTimer = setTimeout(async () => {
            await fetchAutocomplete(val);
            setStatus('');
          }, 320);
        });

        inputEl.addEventListener('blur', () => {
          setTimeout(() => { dropEl.style.display = 'none'; }, 200);
        });

        inputEl.addEventListener('focus', () => {
          if (dropEl.innerHTML) dropEl.style.display = 'block';
        });

        confirmBtn.addEventListener('click', async () => {
          if (!selectedPlace) return;
          confirmBtn.disabled = true;
          confirmBtn.textContent = 'Adicionando…';
          setStatus('');
          try {
            const typeLabel = (selectedPlace.types?.[0] || '').replace(/_/g, ' ');
            const body = {
              place_id:       selectedPlace.place_id,
              name:           selectedPlace.name,
              address:        selectedPlace.formatted_address || '',
              category:       typeLabel,
              city:           publishedCityName,
              ciudad_id:      publishedCityId,
              lat:            selectedPlace.location?.lat ?? 0,
              lng:            selectedPlace.location?.lng ?? 0,
              photo_reference: selectedPlace.photos?.[0]?.photo_reference || undefined,
            };
            const res = await apiFetch('/admin/google-places/ingest-and-publish', {
              method: 'POST',
              body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Erro ao adicionar');
            setStatus('Local adicionado com sucesso!');
            confirmBtn.textContent = '✓ Adicionado';
            loadPublishedList();
            setTimeout(closeModal, 1200);
          } catch(e) {
            setStatus('Erro: ' + e.message);
            confirmBtn.disabled = false;
            confirmBtn.textContent = '+ Confirmar adição';
          }
        });

        inputEl.focus();
      }

      async function loadCurationList() {
        const listEl = document.getElementById('curation-list');
        const pagEl  = document.getElementById('curation-pagination');
        if (!listEl) return;
        listEl.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
        if (pagEl) pagEl.innerHTML = '';

        const params = new URLSearchParams({ status: curationStatusFilter, limit: CURATION_LIMIT, offset: curationOffset });
        if (curationCityFilter) params.set('city', curationCityFilter);
        if (curationCatFilter)  params.set('category', curationCatFilter);
        if (curationMinScore)   params.set('min_kid_score', curationMinScore);
        if (curationMaxScore)   params.set('max_kid_score', curationMaxScore);
        if (curFilaPlaceType)   params.set('place_type', curFilaPlaceType);

        try {
          const res  = await apiFetch('/admin/curation/queue?' + params.toString());
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');

          renderCurationList(data.items || [], data.total || 0);
        } catch(e) {
          listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderCurationList(items, total) {
        const listEl = document.getElementById('curation-list');
        const pagEl  = document.getElementById('curation-pagination');
        if (!listEl) return;

        const pendingTab = document.getElementById('pending-count-tab');
        if (pendingTab && curationStatusFilter === 'pendente') {
          pendingTab.textContent = total > 0 ? ` (${total})` : '';
        }

        if (items.length === 0) {
          listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><p>Nenhum lugar ${curationStatusFilter === 'pendente' ? 'pendente' : curationStatusFilter === 'aprovado' ? 'aprovado' : 'rejeitado'} encontrado.</p></div>`;
          return;
        }

        const isPending  = curationStatusFilter === 'pendente';
        const isAnalista = adminUser?.role === 'analista';

        listEl.innerHTML = items.map(item => {
          const score     = item.kid_score ?? null;
          const scoreColor = score === null ? '#9ca3af' : score >= 70 ? '#059669' : score >= 40 ? '#D97706' : '#DC2626';
          const evidences  = Array.isArray(item.ai_evidences) ? item.ai_evidences : [];
          const photos     = item.photos || [];
          const coverPhoto = photos.find(p => p.is_cover) || photos[0] || null;

          return `
            <div class="card" style="margin-bottom:16px" data-place-id="${escHtml(item.place_id)}">
              <div style="display:flex;gap:16px;align-items:flex-start">
                <!-- Photo thumbnail -->
                <div style="width:80px;height:80px;flex-shrink:0;border-radius:10px;overflow:hidden;background:#f3f4f6;display:flex;align-items:center;justify-content:center">
                  ${coverPhoto
                    ? `<img src="${escHtml(coverPhoto.url)}" alt="foto" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
                    : `<span style="font-size:28px">🏪</span>`
                  }
                </div>
                <!-- Info -->
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                    <span style="font-size:15px;font-weight:700">${escHtml(item.name || item.place_id)}</span>
                    ${item.category ? `<span class="badge" style="background:#e0f2fe;color:#0369a1">${escHtml(item.category)}</span>` : ''}
                    ${score !== null ? `<span class="badge" style="background:${scoreColor}18;color:${scoreColor}">KidScore ${score}</span>` : ''}
                    ${item.place_type === 'comer' ? `<span class="badge" style="background:#fef9c3;color:#854d0e">🍽 Comer</span>` : ''}
                    ${item.place_type === 'parques' ? `<span class="badge" style="background:#dcfce7;color:#166534">🌳 Parques</span>` : ''}
                  </div>
                  ${item.address ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">📍 ${escHtml(item.address)}</div>` : ''}
                  ${item.city ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">🏙️ ${escHtml(item.city)}</div>` : ''}
                  <div style="font-size:11px;color:var(--text-muted)">Ingestão: ${new Date(item.ingested_at).toLocaleDateString('pt-BR')}</div>
                </div>
              </div>

              <!-- AI Evidences (keywords highlighted) -->
              ${evidences.length > 0 ? `
                <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
                  <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px">EVIDÊNCIAS KIDS-FRIENDLY</div>
                  <div style="display:flex;flex-wrap:wrap;gap:6px">
                    ${evidences.map(ev => `<span class="badge" style="background:#fef3c7;color:#92400e;font-size:12px">⭐ ${escHtml(String(ev))}</span>`).join('')}
                  </div>
                </div>
              ` : ''}

              <!-- Description -->
              ${item.description ? `
                <div style="margin-top:10px;font-size:13px;color:var(--text);background:var(--bg);border-radius:8px;padding:10px 12px;line-height:1.5">${escHtml(item.description)}</div>
              ` : ''}

              <!-- Photos grid -->
              ${photos.length > 0 ? `
                <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
                  <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px">FOTOS (${photos.length})</div>
                  <div style="display:flex;gap:8px;flex-wrap:wrap" class="photos-grid" data-place-id="${escHtml(item.place_id)}">
                    ${photos.map(p => `
                      <div style="position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:2px solid ${p.is_cover ? 'var(--primary)' : 'var(--border)'}">
                        <img src="${escHtml(p.url)}" alt="foto" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'">
                        ${!isAnalista ? `
                          <div style="position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;opacity:0;transition:opacity 0.15s" class="photo-actions">
                            ${!p.is_cover && isPending ? `<button class="btn btn-sm" style="background:rgba(255,255,255,0.9);color:#d97706;padding:3px 7px;font-size:10px" data-pid="${escHtml(p.id)}" data-place="${escHtml(item.place_id)}" title="Definir capa">★</button>` : ''}
                            ${isPending ? `<button class="btn btn-sm" style="background:rgba(220,38,38,0.85);color:#fff;padding:3px 7px;font-size:10px" data-pid="${escHtml(p.id)}" title="Excluir" class="del-photo-btn">✕</button>` : ''}
                          </div>
                        ` : ''}
                        ${p.is_cover ? `<span style="position:absolute;top:3px;right:3px;font-size:11px;background:var(--primary);color:#fff;border-radius:4px;padding:1px 4px">capa</span>` : ''}
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : ''}

              <!-- Action buttons -->
              ${isPending && !isAnalista ? `
                <div style="display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap">
                  <button class="btn btn-red btn-sm reject-place-btn" data-id="${escHtml(item.place_id)}" data-name="${escHtml(item.name||item.place_id)}">✕ Rejeitar</button>
                  <button class="btn btn-orange btn-sm edit-approve-btn" data-id="${escHtml(item.place_id)}" data-name="${escHtml(item.name||item.place_id)}" data-desc="${escHtml(item.description||'')}" data-place-type="${escHtml(item.place_type||'comer')}" style="margin-left:auto">✏️ Editar e Aprovar</button>
                  <button class="btn btn-green btn-sm approve-place-btn" data-id="${escHtml(item.place_id)}" data-name="${escHtml(item.name||item.place_id)}">✓ Aprovar</button>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');

        // Photo hover effects
        listEl.querySelectorAll('.photos-grid .photo-actions').forEach(el => {
          const wrap = el.parentElement;
          wrap.addEventListener('mouseenter', () => el.style.opacity = '1');
          wrap.addEventListener('mouseleave', () => el.style.opacity = '0');
        });

        // Set cover photo
        listEl.querySelectorAll('[data-pid][data-place]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const pid    = btn.dataset.pid;
            const placeId = btn.dataset.place;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/photos/${pid}/cover`, { method: 'PATCH', body: JSON.stringify({ place_id: placeId }) });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              loadCurationList();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        // Delete photo buttons
        listEl.querySelectorAll('[data-pid]:not([data-place])').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Excluir esta foto?')) return;
            const pid = btn.dataset.pid;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/photos/${pid}`, { method: 'DELETE' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              loadCurationList();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        // Quick approve
        listEl.querySelectorAll('.approve-place-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id   = btn.dataset.id;
            const name = btn.dataset.name;
            if (!confirm(`Aprovar "${name}"?`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/curation/${id}/approve`, { method: 'POST', body: JSON.stringify({}) });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              loadCurationList();
              loadCuradoriaBadge();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        // Reject
        listEl.querySelectorAll('.reject-place-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id   = btn.dataset.id;
            const name = btn.dataset.name;
            if (!confirm(`Rejeitar "${name}"? O lugar não será publicado no app.`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/curation/${id}/reject`, { method: 'POST', body: JSON.stringify({}) });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              loadCurationList();
              loadCuradoriaBadge();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        // Edit & Approve modal
        listEl.querySelectorAll('.edit-approve-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id        = btn.dataset.id;
            const name      = btn.dataset.name;
            const desc      = btn.dataset.desc;
            const placeType = btn.dataset.placeType || 'comer';
            openCurationEditModal(id, name, desc, placeType);
          });
        });

        // Pagination
        if (pagEl) {
          const totalPages = Math.ceil(total / CURATION_LIMIT);
          const currentPage = Math.floor(curationOffset / CURATION_LIMIT);
          if (totalPages > 1) {
            pagEl.innerHTML = `
              <button class="btn btn-gray btn-sm" id="pag-prev" ${currentPage === 0 ? 'disabled' : ''}>← Anterior</button>
              <span style="font-size:13px;color:var(--text-muted);line-height:2">Página ${currentPage+1} de ${totalPages} (${total} total)</span>
              <button class="btn btn-gray btn-sm" id="pag-next" ${currentPage >= totalPages-1 ? 'disabled' : ''}>Próxima →</button>
            `;
            document.getElementById('pag-prev')?.addEventListener('click', () => {
              curationOffset = Math.max(0, curationOffset - CURATION_LIMIT);
              loadCurationList();
            });
            document.getElementById('pag-next')?.addEventListener('click', () => {
              curationOffset += CURATION_LIMIT;
              loadCurationList();
            });
          }
        }
      }

      function openCurationEditModal(placeId, placeName, desc, placeType) {
        const currentType = placeType || 'comer';
        openModal(
          `Editar e Aprovar — ${placeName}`,
          `
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Edite os dados antes de publicar este lugar no app.</p>
            <div class="field-group">
              <label class="field-label">Nome do lugar</label>
              <input class="field-input" id="edit-name" value="${escHtml(placeName)}" placeholder="Nome do estabelecimento" />
            </div>
            <div class="field-group">
              <label class="field-label">Tipo de lugar</label>
              <select class="field-input" id="edit-place-type">
                <option value="comer" ${currentType==='comer'?'selected':''}>🍽 Comer</option>
                <option value="parques" ${currentType==='parques'?'selected':''}>🌳 Parques</option>
              </select>
            </div>
            <div class="field-group">
              <label class="field-label">Descrição kids-friendly</label>
              <textarea class="field-input" id="edit-desc" rows="4" placeholder="Descreva por que é adequado para famílias com crianças…">${escHtml(desc)}</textarea>
            </div>
          `,
          `
            <button class="btn btn-gray" id="ea-cancel">Cancelar</button>
            <button class="btn btn-green" id="ea-save">✓ Aprovar com edição</button>
          `,
          false,
        );

        document.getElementById('ea-cancel').addEventListener('click', closeModal);

        document.getElementById('ea-save').addEventListener('click', async () => {
          const name = document.getElementById('edit-name').value.trim();
          const description = document.getElementById('edit-desc').value.trim();
          const selectedPlaceType = document.getElementById('edit-place-type').value;
          if (!name) { alert('Nome é obrigatório.'); return; }

          const saveBtn = document.getElementById('ea-save');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Aprovando…';

          try {
            const body = {};
            if (name) body.name = name;
            if (description) body.description = description;
            body.place_type = selectedPlaceType;
            const res = await apiFetch(`/admin/curation/${placeId}/approve`, {
              method: 'POST',
              body: JSON.stringify(body),
            });
            if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
            closeModal();
            loadCurationList();
            loadCuradoriaBadge();
          } catch(e) {
            alert('Erro: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.textContent = '✓ Aprovar com edição';
          }
        });
      }

      // =====================================================================
      // ===== MÓDULO: PARCERIAS & PATROCÍNIOS ================================
      // =====================================================================
      let parceiroTab = 'planos'; // 'planos' | 'contratos' | 'relatorio'
      let planosList = [];
      let contratosList = [];
      let contratosStatusFilter = '';

      async function renderParceiros() {
        pageContent.innerHTML = `
          <div class="tabs-row">
            <button class="tab-btn ${parceiroTab==='planos'?'active':''}" id="tab-planos">📦 Planos Comerciais</button>
            <button class="tab-btn ${parceiroTab==='contratos'?'active':''}" id="tab-contratos">📋 Contratos</button>
            <button class="tab-btn ${parceiroTab==='relatorio'?'active':''}" id="tab-relatorio">📊 Relatório</button>
          </div>
          <div id="parceiro-tab-content"><div class="spinner-wrap"><div class="spinner"></div></div></div>
        `;

        document.getElementById('tab-planos').addEventListener('click', () => { parceiroTab='planos'; renderParceiros(); });
        document.getElementById('tab-contratos').addEventListener('click', () => { parceiroTab='contratos'; renderParceiros(); });
        document.getElementById('tab-relatorio').addEventListener('click', () => { parceiroTab='relatorio'; renderParceiros(); });

        if (parceiroTab === 'planos') await renderPlanosTab();
        else if (parceiroTab === 'contratos') await renderContratosTab();
        else await renderRelatorioTab();
      }

      // ===== ABA: PLANOS =====
      async function renderPlanosTab() {
        const el = document.getElementById('parceiro-tab-content');
        el.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
        try {
          const res = await apiFetch('/admin/sponsorship/plans');
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          planosList = data.plans || [];
          renderPlanosUI();
        } catch(e) {
          el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderPlanosUI() {
        const el = document.getElementById('parceiro-tab-content');
        const isAdmin = adminUser?.role === 'super_admin' || adminUser?.role === 'admin' || adminUser?.role === 'curador';

        el.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div>
              <span style="font-size:14px;color:var(--text-muted)">${planosList.length} plano${planosList.length!==1?'s':''} cadastrado${planosList.length!==1?'s':''}</span>
            </div>
            ${isAdmin ? '<button class="btn btn-orange" id="new-plano-btn">+ Novo Plano</button>' : ''}
          </div>

          ${planosList.length === 0
            ? '<div class="empty-state"><div class="empty-state-icon">📦</div><p>Nenhum plano cadastrado</p></div>'
            : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
                ${planosList.map(p => {
                  const colors = [['#FF6B35','#fff3ef'],['#2563EB','#eff6ff'],['#059669','#f0fdf4'],['#7C3AED','#f5f3ff']];
                  const [c,bg] = colors[Math.abs(p.name.length) % colors.length];
                  return `
                    <div class="card" style="border-top:3px solid ${c};position:relative">
                      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
                        <div>
                          <div style="font-size:18px;font-weight:700;color:var(--text)">${escHtml(p.name)}</div>
                          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Prioridade ${p.priority}</div>
                        </div>
                        <div style="text-align:right">
                          <div style="font-size:20px;font-weight:700;color:${c}">R$ ${parseFloat(p.reference_price||0).toLocaleString('pt-BR',{minimumFractionDigits:0})}</div>
                          <div style="font-size:11px;color:var(--text-muted)">preço de referência</div>
                        </div>
                      </div>
                      ${p.benefits ? `<p style="font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:12px">${escHtml(p.benefits)}</p>` : ''}
                      ${isAdmin ? `
                        <div style="display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px">
                          <button class="btn btn-sm btn-outline edit-plano" data-id="${p.id}">✏️ Editar</button>
                          <button class="btn btn-sm btn-red delete-plano" data-id="${p.id}" data-name="${escHtml(p.name)}">🗑 Excluir</button>
                        </div>
                      ` : ''}
                    </div>
                  `;
                }).join('')}
              </div>`
          }
        `;

        document.getElementById('new-plano-btn')?.addEventListener('click', () => openPlanoModal(null));

        el.querySelectorAll('.edit-plano').forEach(btn => {
          btn.addEventListener('click', () => {
            const plan = planosList.find(p => p.id === btn.dataset.id);
            if (plan) openPlanoModal(plan);
          });
        });

        el.querySelectorAll('.delete-plano').forEach(btn => {
          btn.addEventListener('click', async () => {
            const { id, name } = btn.dataset;
            if (!confirm(`Excluir o plano "${name}"? Contratos associados ainda existirão.`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/sponsorship/plans/${id}`, { method: 'DELETE' });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              await renderPlanosTab();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });
      }

      function openPlanoModal(plan) {
        const isNew = !plan;
        openModal(isNew ? 'Novo Plano Comercial' : 'Editar Plano', `
          <div class="field-group">
            <label class="field-label">Nome do plano *</label>
            <input class="field-input" id="pl-name" value="${plan?escHtml(plan.name):''}" placeholder="Ex: Ouro" />
          </div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Prioridade de exibição *</label>
              <input class="field-input" id="pl-priority" type="number" value="${plan?plan.priority:0}" min="0" max="9999" placeholder="0" />
              <p class="field-sub">Maior número = posição mais alta na busca.</p>
            </div>
            <div class="field-group">
              <label class="field-label">Preço de referência (R$)</label>
              <input class="field-input" id="pl-price" type="number" value="${plan?parseFloat(plan.reference_price||0):0}" min="0" step="0.01" placeholder="0.00" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Benefícios (texto livre)</label>
            <textarea class="field-input" id="pl-benefits" rows="4" placeholder="Descreva os benefícios incluídos neste plano...">${plan&&plan.benefits?escHtml(plan.benefits):''}</textarea>
          </div>
        `, `
          <button class="btn btn-gray" id="pl-cancel">Cancelar</button>
          <button class="btn btn-orange" id="pl-save">Salvar Plano</button>
        `);

        document.getElementById('pl-cancel').addEventListener('click', closeModal);

        document.getElementById('pl-save').addEventListener('click', async () => {
          const name     = document.getElementById('pl-name').value.trim();
          const priority = parseInt(document.getElementById('pl-priority').value, 10);
          const price    = parseFloat(document.getElementById('pl-price').value) || 0;
          const benefits = document.getElementById('pl-benefits').value.trim() || null;

          if (!name) { alert('Nome é obrigatório.'); return; }
          if (isNaN(priority) || priority < 0) { alert('Prioridade deve ser um número positivo.'); return; }

          const saveBtn = document.getElementById('pl-save');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Salvando…';
          try {
            const body = { name, priority, reference_price: price, benefits };
            const res = plan
              ? await apiFetch(`/admin/sponsorship/plans/${plan.id}`, { method: 'PATCH', body: JSON.stringify(body) })
              : await apiFetch('/admin/sponsorship/plans', { method: 'POST', body: JSON.stringify(body) });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            closeModal();
            await renderPlanosTab();
          } catch(e) {
            alert('Erro: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.textContent = 'Salvar Plano';
          }
        });
      }

      async function loadCuradoriaBadge() {
        try {
          const res  = await apiFetch('/admin/curation/pending-count');
          const data = await res.json();
          if (res.ok && data.count > 0) {
            curadoriaBadge.textContent = data.count;
            curadoriaBadge.style.display = '';
          } else {
            curadoriaBadge.style.display = 'none';
          }
        } catch {}
      }

      // ===== ABA: CONTRATOS =====
      async function renderContratosTab() {
        const el = document.getElementById('parceiro-tab-content');
        el.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
        try {
          const param = contratosStatusFilter ? `?status=${encodeURIComponent(contratosStatusFilter)}` : '';
          const [resContratos, resPlanos] = await Promise.all([
            apiFetch(`/admin/sponsorship/contracts${param}`),
            apiFetch('/admin/sponsorship/plans'),
          ]);
          const dc = await resContratos.json();
          const dp = await resPlanos.json();
          if (!resContratos.ok) throw new Error(dc.error || 'Erro');
          contratosList = dc.contracts || [];
          planosList = dp.plans || [];
          renderContratosUI();
        } catch(e) {
          el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      function renderContratosUI() {
        const el = document.getElementById('parceiro-tab-content');
        const isAdmin = adminUser?.role === 'super_admin' || adminUser?.role === 'admin' || adminUser?.role === 'curador';
        const now = new Date();
        const in30days = new Date(now.getTime() + 30*24*60*60*1000);
        const statusColors = { ativo:'#059669', expirado:'#9ca3af', cancelado:'#dc2626' };
        const statusLabels = { ativo:'Ativo', expirado:'Expirado', cancelado:'Cancelado' };

        el.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
            <select class="select-input" id="contratos-status-filter">
              <option value="" ${!contratosStatusFilter?'selected':''}>Todos os status</option>
              <option value="ativo" ${contratosStatusFilter==='ativo'?'selected':''}>Ativo</option>
              <option value="expirado" ${contratosStatusFilter==='expirado'?'selected':''}>Expirado</option>
              <option value="cancelado" ${contratosStatusFilter==='cancelado'?'selected':''}>Cancelado</option>
            </select>
            <span style="font-size:13px;color:var(--text-muted);flex:1">${contratosList.length} contrato${contratosList.length!==1?'s':''}</span>
            ${isAdmin ? '<button class="btn btn-orange" id="new-contrato-btn">+ Novo Contrato</button>' : ''}
          </div>

          ${contratosList.length === 0
            ? '<div class="empty-state"><div class="empty-state-icon">📋</div><p>Nenhum contrato encontrado</p></div>'
            : contratosList.map(c => {
                const endsAt = new Date(c.ends_at);
                const isExpiring = c.status === 'ativo' && endsAt <= in30days && endsAt > now;
                const isExpired = c.status === 'expirado';
                const isCanceled = c.status === 'cancelado';
                return `
                  <div class="card card-sm" style="margin-bottom:8px;${isCanceled||isExpired?'opacity:0.75':''}">
                    <div style="display:flex;align-items:flex-start;gap:12px">
                      <div style="flex:1;min-width:0">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                          <span style="font-size:15px;font-weight:700;color:var(--text)">${escHtml(c.place_name)}</span>
                          <span class="badge" style="background:${statusColors[c.status]}18;color:${statusColors[c.status]}">${statusLabels[c.status]||c.status}</span>
                          ${isExpiring ? '<span class="badge" style="background:#fffbeb;color:#d97706">⚠️ Vence em 30 dias</span>' : ''}
                        </div>
                        <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px">
                          <span style="background:#f3f4f6;padding:2px 8px;border-radius:4px;margin-right:6px">📦 ${escHtml(c.plan_name)}</span>
                          <span>Prioridade ${c.plan_priority}</span>
                        </div>
                        <div style="font-size:12px;color:var(--text-muted)">
                          📅 ${new Date(c.starts_at).toLocaleDateString('pt-BR')} → ${new Date(c.ends_at).toLocaleDateString('pt-BR')}
                          ${c.notes ? `<span style="margin-left:12px;font-style:italic">📝 ${escHtml(c.notes)}</span>` : ''}
                        </div>
                      </div>
                      ${isAdmin ? `
                        <div style="display:flex;gap:6px;flex-shrink:0">
                          ${c.status === 'ativo' ? `
                            <button class="btn btn-sm btn-gray edit-contrato" data-id="${c.id}">✏️</button>
                            <button class="btn btn-sm btn-red cancel-contrato" data-id="${c.id}" data-name="${escHtml(c.place_name)}">✕</button>
                          ` : ''}
                          <button class="btn btn-sm btn-gray view-perf" data-id="${c.id}" data-name="${escHtml(c.place_name)}">📊</button>
                        </div>
                      ` : ''}
                    </div>
                  </div>
                `;
              }).join('')
          }
        `;

        document.getElementById('contratos-status-filter')?.addEventListener('change', e => {
          contratosStatusFilter = e.target.value;
          renderContratosTab();
        });

        document.getElementById('new-contrato-btn')?.addEventListener('click', () => openContratoModal(null));

        el.querySelectorAll('.edit-contrato').forEach(btn => {
          btn.addEventListener('click', () => {
            const c = contratosList.find(x => x.id === btn.dataset.id);
            if (c) openContratoModal(c);
          });
        });

        el.querySelectorAll('.cancel-contrato').forEach(btn => {
          btn.addEventListener('click', async () => {
            const { id, name } = btn.dataset;
            if (!confirm(`Cancelar o contrato de "${name}"? Esta ação não pode ser desfeita.`)) return;
            btn.disabled = true;
            try {
              const res = await apiFetch(`/admin/sponsorship/contracts/${id}`, { method: 'PATCH', body: JSON.stringify({ status: 'cancelado' }) });
              if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erro'); }
              await renderContratosTab();
            } catch(e) { alert('Erro: ' + e.message); btn.disabled = false; }
          });
        });

        el.querySelectorAll('.view-perf').forEach(btn => {
          btn.addEventListener('click', () => {
            parceiroTab = 'relatorio';
            renderParceiros().then(() => {
              const selEl = document.getElementById('relatorio-contrato-select');
              if (selEl) { selEl.value = btn.dataset.id; selEl.dispatchEvent(new Event('change')); }
            });
          });
        });
      }

      async function openContratoModal(contrato) {
        const isNew = !contrato;
        let searchTimeout;
        let searchResults = [];

        openModal(isNew ? 'Novo Contrato' : 'Editar Contrato', `
          ${isNew ? `
            <div class="field-group">
              <label class="field-label">Buscar estabelecimento *</label>
              <div style="display:flex;gap:8px">
                <input class="field-input" id="ct-search" placeholder="Nome do estabelecimento..." style="flex:1" />
                <select class="select-input" id="ct-city" style="min-width:130px">
                  <option value="">Qualquer cidade</option>
                </select>
              </div>
              <div id="ct-search-results" style="margin-top:8px"></div>
              <input type="hidden" id="ct-place-id" />
              <input type="hidden" id="ct-place-name" />
            </div>
          ` : `
            <div class="info-box" style="margin-bottom:16px">
              <span class="info-box-icon">📍</span>
              <span><strong>${escHtml(contrato.place_name)}</strong></span>
            </div>
          `}
          <div class="field-group">
            <label class="field-label">Plano *</label>
            <select class="field-input" id="ct-plan">
              <option value="">Selecione um plano</option>
              ${planosList.map(p => `<option value="${p.id}" ${contrato&&contrato.plan_id===p.id?'selected':''}>${escHtml(p.name)} (Prioridade ${p.priority})</option>`).join('')}
            </select>
          </div>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Data de início *</label>
              <input class="field-input" id="ct-starts" type="date" value="${contrato?contrato.starts_at.slice(0,10):new Date().toISOString().slice(0,10)}" />
            </div>
            <div class="field-group">
              <label class="field-label">Data de fim *</label>
              <input class="field-input" id="ct-ends" type="date" value="${contrato?contrato.ends_at.slice(0,10):''}" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Notas internas</label>
            <textarea class="field-input" id="ct-notes" rows="2" placeholder="Observações internas sobre este contrato...">${contrato&&contrato.notes?escHtml(contrato.notes):''}</textarea>
          </div>
        `, `
          <button class="btn btn-gray" id="ct-cancel">Cancelar</button>
          <button class="btn btn-orange" id="ct-save">Salvar Contrato</button>
        `, true);

        document.getElementById('ct-cancel').addEventListener('click', closeModal);

        if (isNew) {
          const searchInput = document.getElementById('ct-search');
          const resultsDiv  = document.getElementById('ct-search-results');
          const placeIdHidden = document.getElementById('ct-place-id');
          const placeNameHidden = document.getElementById('ct-place-name');

          searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const q = searchInput.value.trim();
            if (q.length < 2) { resultsDiv.innerHTML = ''; return; }
            searchTimeout = setTimeout(async () => {
              resultsDiv.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">Buscando…</div>';
              try {
                const city = document.getElementById('ct-city').value;
                const url  = `/admin/sponsorship/search-places?q=${encodeURIComponent(q)}${city?'&city='+encodeURIComponent(city):''}`;
                const res  = await apiFetch(url);
                const d    = await res.json();
                searchResults = d.places || [];
                if (searchResults.length === 0) {
                  resultsDiv.innerHTML = '<div style="font-size:12px;color:var(--text-muted)">Nenhum resultado</div>';
                } else {
                  resultsDiv.innerHTML = searchResults.map((p,i) => `
                    <div class="item-row search-result-item" data-idx="${i}" style="cursor:pointer;padding:10px 12px">
                      <div style="flex:1;min-width:0">
                        <div style="font-size:13px;font-weight:600">${escHtml(p.name)}</div>
                        <div style="font-size:11px;color:var(--text-muted)">${escHtml(p.formatted_address||'')}</div>
                      </div>
                      <span style="font-size:11px;color:var(--primary)">Selecionar →</span>
                    </div>
                  `).join('');
                  resultsDiv.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', () => {
                      const idx = parseInt(item.dataset.idx, 10);
                      const place = searchResults[idx];
                      placeIdHidden.value = place.place_id;
                      placeNameHidden.value = place.name;
                      searchInput.value = place.name;
                      resultsDiv.innerHTML = `<div class="info-box" style="margin-top:4px"><span>✅ Selecionado: <strong>${escHtml(place.name)}</strong></span></div>`;
                    });
                  });
                }
              } catch(e) {
                resultsDiv.innerHTML = `<div style="font-size:12px;color:var(--red)">Erro: ${escHtml(e.message)}</div>`;
              }
            }, 350);
          });
        }

        document.getElementById('ct-save').addEventListener('click', async () => {
          const planId  = document.getElementById('ct-plan').value;
          const starts  = document.getElementById('ct-starts').value;
          const ends    = document.getElementById('ct-ends').value;
          const notes   = document.getElementById('ct-notes').value.trim() || null;
          const placeId   = isNew ? document.getElementById('ct-place-id').value   : contrato.place_id;
          const placeName = isNew ? document.getElementById('ct-place-name').value : contrato.place_name;

          if (isNew && !placeId)  { alert('Selecione um estabelecimento.'); return; }
          if (!planId) { alert('Selecione um plano.'); return; }
          if (!starts || !ends)   { alert('Informe as datas de início e fim.'); return; }
          if (new Date(ends) <= new Date(starts)) { alert('A data de fim deve ser posterior ao início.'); return; }

          const saveBtn = document.getElementById('ct-save');
          saveBtn.disabled = true;
          saveBtn.textContent = 'Salvando…';
          try {
            const body = {
              place_id: placeId,
              place_name: placeName,
              plan_id: planId,
              starts_at: new Date(starts).toISOString(),
              ends_at: new Date(ends+'T23:59:59').toISOString(),
              notes,
            };
            const res = contrato
              ? await apiFetch(`/admin/sponsorship/contracts/${contrato.id}`, { method: 'PATCH', body: JSON.stringify(body) })
              : await apiFetch('/admin/sponsorship/contracts', { method: 'POST', body: JSON.stringify(body) });
            const d = await res.json();
            if (!res.ok) throw new Error(d.error || 'Erro');
            closeModal();
            await renderContratosTab();
          } catch(e) {
            alert('Erro: ' + e.message);
            saveBtn.disabled = false;
            saveBtn.textContent = 'Salvar Contrato';
          }
        });
      }

      // ===== ABA: RELATÓRIO =====
      async function renderRelatorioTab() {
        const el = document.getElementById('parceiro-tab-content');
        el.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

        try {
          const res = await apiFetch('/admin/sponsorship/contracts?status=ativo');
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erro');
          const ativos = data.contracts || [];

          el.innerHTML = `
            <div class="info-box" style="margin-bottom:20px">
              <span class="info-box-icon">ℹ️</span>
              <span>Métricas de impressões e acessos são acumuladas desde a criação do contrato. Impressões = vezes que o local apareceu nos resultados de busca. Acessos = vezes que o detalhe do local foi aberto.</span>
            </div>
            <div class="field-group" style="max-width:400px;margin-bottom:20px">
              <label class="field-label">Selecionar contrato ativo</label>
              <select class="field-input" id="relatorio-contrato-select">
                <option value="">Selecione um contrato…</option>
                ${ativos.map(c => `<option value="${c.id}">${escHtml(c.place_name)} — ${escHtml(c.plan_name)}</option>`).join('')}
              </select>
            </div>
            <div id="relatorio-content"></div>
          `;

          document.getElementById('relatorio-contrato-select').addEventListener('change', async (e) => {
            const id = e.target.value;

            rcontent.innerHTML = '<div class="spinner-wrap" style="height:100px"><div class="spinner"></div></div>';
            try {
              const perfRes = await apiFetch(`/admin/sponsorship/contracts/${id}/performance`);
              const perfData = await perfRes.json();
              if (!perfRes.ok) throw new Error(perfData.error || 'Erro');
              const p = perfData.performance;
              const contract = ativos.find(c => c.id === id);
              rcontent.innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px">
                  <div class="card" style="text-align:center;border-top:3px solid #2563EB">
                    <div style="font-size:32px;font-weight:700;color:#2563EB">${p.impressions.toLocaleString('pt-BR')}</div>
                    <div style="font-size:13px;color:var(--text-muted);margin-top:4px">👁️ Impressões (busca)</div>
                  </div>
                  <div class="card" style="text-align:center;border-top:3px solid #059669">
                    <div style="font-size:32px;font-weight:700;color:#059669">${p.detail_accesses.toLocaleString('pt-BR')}</div>
                    <div style="font-size:13px;color:var(--text-muted);margin-top:4px">🖱️ Acessos ao detalhe</div>
                  </div>
                  <div class="card" style="text-align:center;border-top:3px solid var(--primary)">
                    <div style="font-size:32px;font-weight:700;color:var(--primary)">${p.impressions > 0 ? ((p.detail_accesses / p.impressions * 100).toFixed(1) + '%') : '—'}</div>
                    <div style="font-size:13px;color:var(--text-muted);margin-top:4px">📈 CTR (acesso/impressão)</div>
                  </div>
                </div>
                ${contract ? `
                  <div class="card card-sm">
                    <div style="font-size:13px;font-weight:600;margin-bottom:10px">Detalhes do Contrato</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
                      <div><span style="color:var(--text-muted)">Estabelecimento:</span> <strong>${escHtml(contract.place_name)}</strong></div>
                      <div><span style="color:var(--text-muted)">Plano:</span> <strong>${escHtml(contract.plan_name)}</strong></div>
                      <div><span style="color:var(--text-muted)">Início:</span> ${new Date(contract.starts_at).toLocaleDateString('pt-BR')}</div>
                      <div><span style="color:var(--text-muted)">Fim:</span> ${new Date(contract.ends_at).toLocaleDateString('pt-BR')}</div>
                      <div><span style="color:var(--text-muted)">Prioridade:</span> ${contract.plan_priority}</div>
                    </div>
                  </div>
                ` : ''}
              `;
            } catch(e) {
              rcontent.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
            }
          });
        } catch(e) {
          el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Erro: ${escHtml(e.message)}</p></div>`;
        }
      }

      // =====================================================================
      // ===== SHELL / LOGIN TOGGLE ===========================================
      // =====================================================================
      function enterShell() {
        loginPage.style.display = 'none';
        appShell.style.display  = 'flex';

        if (adminUser) {
          const initial = adminUser.name.charAt(0).toUpperCase();
          adminName.textContent       = adminUser.name;
          adminAvatar.textContent     = initial;
          adminRoleLabel.textContent  = adminUser.role;
          topbarAdminName.textContent = adminUser.name;
          topbarAvatar.textContent    = initial;
        }

        navigateTo('dashboard');
        loadFeedbackBadge();
        loadCuradoriaBadge();
      }

      function showLogin() {
        appShell.style.display  = 'none';
        loginPage.style.display = 'flex';
        loginError.style.display = 'none';
        document.getElementById('email').value    = '';
        document.getElementById('password').value = '';
      }

      async function loadFeedbackBadge() {
        try {
          const res  = await apiFetch('/admin/feedback?type=sugestao');
          const data = await res.json();
          if (res.ok && data.unreadCount > 0) {
            feedbackBadge.textContent = data.unreadCount;
            feedbackBadge.style.display = '';
          }
        } catch {}
      }

      // ===== INIT =====
      async function init() {
        if (!currentToken) { showLogin(); return; }

        try {
          const res  = await apiFetch('/admin/auth/me');
          if (!res.ok) throw new Error('unauthorized');
          const data = await res.json();
          adminUser  = data.user;
          enterShell();
        } catch {
          currentToken = null;
          localStorage.removeItem(STORAGE_KEY);
          showLogin();
        }
      }

      // ===== UTILS =====
      function escHtml(str) {
        return String(str ?? '')
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;');
      }

      init();
    })();
    </script>
  </body>
</html>
